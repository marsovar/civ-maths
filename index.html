function sbSwitchTab(tab){
  document.querySelectorAll('[id^="sb-tab-"]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('sb-tab-'+tab); if(btn) btn.classList.add('active');
  const c=document.getElementById('sb-content'); if(!c) return;
  if(tab==='rank'){
    if(_usersCache.length) sbRenderList(c,_usersCache);
    else _fetchAllUsers(true).then(users=>{ const el=document.getElementById('sb-content'); if(el) sbRenderList(el,users); });
  } else if(tab==='duels'){
    sbRenderDuelsTab(c);
  } else if(tab==='activity'){
    sbRenderActivityTab(c);
  }
}

async function sbRenderDuelsTab(container){
  if(!_ablyReady){ container.innerHTML='<div style="text-align:center;padding:32px;font-family:var(--ff-mono);font-size:10px;color:var(--t4)">Connexion au serveur en cours...</div>'; return; }
  container.innerHTML='<div style="text-align:center;padding:20px;color:var(--t4);font-family:var(--ff-mono);font-size:10px">Chargement…</div>';
  try{
    const listResult=await storageList('duel_result:',true);
    if(!listResult||!listResult.keys.length){ container.innerHTML='<div style="text-align:center;padding:32px;font-family:var(--ff-mono);font-size:11px;color:var(--t4)">Aucun duel joué pour l\'instant.<br><span style="font-size:10px">Défie un ami depuis le classement !</span></div>'; return; }
    const raws=await Promise.all(listResult.keys.slice(-20).map(k=>storageGet(k,true)));
    const duels=raws.filter(Boolean).map(r=>JSON.parse(r.value)).sort((a,b)=>b.ts-a.ts);
    let html='<div style="display:flex;flex-direction:column;gap:6px">';
    duels.forEach(d=>{
      const isMe=_currentUser&&d.player===_currentUser.name;
      const won=d.score>=3;
      const timeAgo=_timeAgo(d.ts);
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border:1px solid var(--bd);border-radius:8px;border-left:3px solid ${won?'var(--green)':'var(--red)'}">
        <span style="font-size:14px">${won?'🏆':'💀'}</span>
        <div style="flex:1">
          <div style="font-size:12px;color:var(--t1)"><strong>${d.player}</strong> <span style="color:var(--t4)">vs</span> <strong>${d.opponent}</strong></div>
          <div style="font-family:var(--ff-mono);font-size:9px;color:var(--t4)">${timeAgo} · ${d.time||'?'}s</div>
        </div>
        <div style="font-family:var(--ff-mono);font-size:16px;font-weight:700;color:${won?'var(--green)':'var(--red)'}">${d.score}/5</div>
      </div>`;
    });
    html+='</div>';
    container.innerHTML=html;
  }catch(e){ container.innerHTML='<div style="text-align:center;padding:32px;font-family:var(--ff-mono);font-size:10px;color:var(--t4)">Erreur de chargement</div>'; }
}

async function sbRenderActivityTab(container){
  const users=await _fetchAllUsers();
  if(!users.length){ container.innerHTML='<div style="text-align:center;padding:32px;font-family:var(--ff-mono);font-size:10px;color:var(--t4)">Aucune activité</div>'; return; }
  // Show a leaderboard comparison chart
  let html='<div style="display:flex;flex-direction:column;gap:14px">';
  // Domain comparison
  ['alg','ana','prob'].forEach(dk=>{
    const dom=DOMAINS[dk];
    html+=`<div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:12px 14px">
      <div style="font-family:var(--ff-mono);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:${dom.color};margin-bottom:8px">${dom.name}</div>`;
    users.slice(0,8).forEach(u=>{
      const pct=(u.scores?.[dk]||0).toFixed(0);
      html+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-family:var(--ff-mono);font-size:10px;color:var(--t3);min-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.name}</span>
        <div style="flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${dom.color};border-radius:3px;transition:width .5s"></div></div>
        <span style="font-family:var(--ff-mono);font-size:10px;font-weight:600;color:${dom.color};min-width:30px;text-align:right">${pct}%</span>
      </div>`;
    });
    html+=`</div>`;
  });
  // Best streaks ranking
  const byStreak=[...users].sort((a,b)=>(b.bestStreak||0)-(a.bestStreak||0));
  html+=`<div style="background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:12px 14px">
    <div style="font-family:var(--ff-mono);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold2);margin-bottom:8px">🔥 Meilleures séries</div>`;

function _timeAgo(ts){
  const diff=Math.floor((Date.now()-ts)/1000);
  if(diff<60) return 'à l\'instant';
  if(diff<3600) return Math.floor(diff/60)+'min';
  if(diff<86400) return Math.floor(diff/3600)+'h';
  return Math.floor(diff/86400)+'j';
}

//  ONLINE v32 — Architecture propre et fiable
//
//  PRÉSENCE  : Ably Presence natif avec clientId STABLE (= nom user)
//              → pas de fantôme, une seule entrée par user
//  CHAT      : Canal Ably dédié "ecg:chat" en pub/sub pur
//              → pas de read-modify-write, pas de perte de message
//  SCORES    : Canal "ecg:kv" pour les stats (inchangé)

// ─── Helpers ────────────────────────────────────────────────────

// ─── SHA-256 ─────────────────────────────────────────────────────
async function _hashPassword(pw){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32);
}

// ══════════════════════════════════════════════════════════════════
//  ABLY INIT
// ══════════════════════════════════════════════════════════════════
function _ablyChannel(name){
  if(!_ably) return null;
  if(!_ablyChannels[name]){
    // Canal KV avec rewind 2h → récupère les derniers messages même après reconnexion
    const opts = name === 'ecg:kv' ? {params: {rewind: '2h'}} : {};
    _ablyChannels[name] = _ably.channels.get(name, opts);
  }
  return _ablyChannels[name];
}

async function ablyInit(){
  return new Promise(resolve => {
    if(typeof Ably !== 'undefined'){ _setupAbly(resolve); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.ably.com/lib/ably.min-2.js';
    s.onload  = () => _setupAbly(resolve);
    s.onerror = () => { console.warn('[Ably] script load failed'); resolve(); };
    document.head.appendChild(s);
  });
}

function _setupAbly(resolve){
  try{
    // clientId = nom utilisateur = STABLE → une seule entrée de présence par user
    // On utilisera un clientId générique au départ, puis on entrera avec le nom au login
    _ably = new Ably.Realtime({
      key: ABLY_KEY,
      clientId: 'anon-' + Math.random().toString(36).slice(2,8)
    });

    _ably.connection.on('connected', async () => {
      _ablyReady = true;
      console.log('[Ably] connected');

      // ── Canal KV : scores, duels ─────────────────────────────
      const kvCh = _ablyChannel('ecg:kv');
      kvCh.subscribe('set', msg => {
        const {key, value} = msg.data;
        _kv[key] = value;
        if(key.startsWith('ecg_math_users:') && key !== 'ecg_math_users:index'){
          _onAblyUserUpdate(value);
        }
      });

      // ── Canal Chat : pub/sub pur, plus de KV pour le chat ───
      const chatCh = _ablyChannel('ecg:chat');
      chatCh.subscribe('msg', msg => {
        const m = msg.data;
        if(!m || !m.ts || !m.author) return;
        const now = Date.now();
        // Déduplique par ts+author
        const exists = _chatMsgs.some(x => x.ts===m.ts && x.author===m.author);
        if(!exists){
          _chatMsgs.push(m);
          // Garder seulement les messages < CHAT_TTL
          _chatMsgs = _chatMsgs.filter(x => (now - x.ts) < CHAT_TTL).slice(-CHAT_MAX);
          _chatMsgs.sort((a,b) => a.ts - b.ts);
          if(_chatOpen){ chatRenderMessages(); _chatMarkRead(); }
          else{
            const me = _currentUser?.name;
            if(m.author !== me && m.ts > _chatLastSeen){
              _chatUnread++;
              _chatRefreshBadge();
            }
          }
        }
      });
      // Charger l'historique du chat au démarrage (72h Ably)
      _loadChatHistory();

      // ── Canal Présence : qui est vraiment sur le site ────────
      const presenceCh = _ablyChannel('ecg:presence');
      presenceCh.presence.subscribe(member => _onPresenceEvent(member));
      try{
        const existing = await presenceCh.presence.get();
        _presenceMembers = {};
        existing.forEach(m => {
          if(m.data && m.data.name){
            _presenceMembers[m.data.name] = m.data;
          }
        });
        updateOnlineCount();
      }catch(e){}

      // ── Canal Duels ──────────────────────────────────────────
      const duelCh = _ablyChannel('ecg:duels');
      duelCh.subscribe('invite', msg => {
        if(!_currentUser) return;
        if(msg.data.to === _currentUser.name && !_duelState)
          _showDuelNotifBanner(msg.data.from);
      });
      duelCh.subscribe('accept', msg => {
        if(!_currentUser) return;
        if(msg.data.from === _currentUser.name && msg.data.to && !_duelState)
          _startDuel(msg.data.to);
      });
      duelCh.subscribe('result', msg => {
        if(!_currentUser || !_duelState) return;
        if(msg.data.player !== _currentUser.name)
          _onOpponentDuelResult(msg.data);
      });

      resolve();
    });

    _ably.connection.on('disconnected', () => { _ablyReady = false; });
    _ably.connection.on('failed',       () => { console.warn('[Ably] connection failed'); resolve(); });
    // Reconnexion automatique : Ably gère ça nativement
    _ably.connection.on('connected',    () => { _ablyReady = true; });

  }catch(e){ console.warn('[Ably] setup error:', e); resolve(); }
}

// ══════════════════════════════════════════════════════════════════
//  PRÉSENCE — basée sur le NOM (pas clientId aléatoire)
// ══════════════════════════════════════════════════════════════════
function _isPagePresent(){
  return !!(_currentUser && _ablyReady && document.visibilityState === 'visible' && document.hasFocus());
}

async function _presenceEnter(){
  if(!_ablyReady || !_currentUser || !_isPagePresent()) return;
  try{
    const ch = _ablyChannel('ecg:presence');
    const data = {
      name: _currentUser.name,
      color: _currentUser.color,
      ts: Date.now(),
      visible: document.visibilityState === 'visible',
      focused: document.hasFocus()
    };
    // enter() — si déjà entré ça lève une erreur qu'on ignore
    try{ await ch.presence.enter(data); }
    catch(e){
      // Déjà entré → update
      try{ await ch.presence.update(data); }catch(e2){}
    }
  }catch(e){}
}

async function _presenceLeave(){
  if(!_ablyReady) return;
  try{ await _ablyChannel('ecg:presence').presence.leave(); }catch(e){}
  // Supprimer localement immédiatement
  if(_currentUser) delete _presenceMembers[_currentUser.name];
  updateOnlineCount();
}

async function _syncPresenceFromVisibility(){
  if(!_currentUser || !_ablyReady) return;
  if(_isPagePresent()) await _presenceEnter();
  else await _presenceLeave();
}

function _onPresenceEvent(member){
  if(!member.data || !member.data.name) return;
  const name = member.data.name;
  if(member.action === 'leave' || member.action === 'absent'){
    delete _presenceMembers[name];
  } else {
    // enter / update / present
    _presenceMembers[name] = member.data;
    // Important : un joueur réellement en ligne doit apparaître même si l'index KV est en retard.
    if(!_usersCache.some(u=>u && u.name===name)) _hydrateScoreboardUserByName(name);
  }
  updateOnlineCount();
}

// ══════════════════════════════════════════════════════════════════
//  STORAGE — KV Ably (scores, index users, duels)
// ══════════════════════════════════════════════════════════════════
async function storageSet(key, value, shared){
  _kv[key] = value;
  // Persister localement les clés critiques (index + données users)
  // → fallback si Ably history expire (plan gratuit = 2min sans rewind)
  if(key === 'ecg_math_users:index' || key.startsWith('ecg_math_users:')){
    try{ localStorage.setItem('_ably_kv_' + key, value); }catch(e){}
  }
  if(_ablyReady){
    try{ await _ablyChannel('ecg:kv').publish('set', {key, value}); }catch(e){}
  }
  return {key, value};
}

async function storageGet(key, shared){
  // 1. Cache mémoire (le plus rapide)
  if(_kv[key] !== undefined) return {key, value: _kv[key]};
  // 2. localStorage (fallback si Ably history expiré)
  try{
    const ls = localStorage.getItem('_ably_kv_' + key);
    if(ls){ _kv[key] = ls; return {key, value: ls}; }
  }catch(e){}
  // 3. Ably history paginée (72h avec rewind)
  if(_ablyReady){
    try{
      let page = await _ablyChannel('ecg:kv').history({limit:1000, direction:'backwards'});
      do{
        for(const msg of (page?.items||[])){
          if(msg.name==='set' && msg.data?.key===key){
            _kv[key] = msg.data.value;
            return {key, value: msg.data.value};
          }
        }
        if(page?.hasNext()) page = await page.next();
        else break;
      }while(page);
    }catch(e){}
  }
  return null;
}

// Bootstrap KV depuis localStorage au démarrage
function _bootstrapKVFromLocalStorage(){
  try{
    for(let i=0; i<localStorage.length; i++){
      const k = localStorage.key(i);
      if(k && k.startsWith('_ably_kv_')){
        const realKey = k.slice(9); // enlever '_ably_kv_'
        if(_kv[realKey] === undefined){
          _kv[realKey] = localStorage.getItem(k);
        }
      }
    }
  }catch(e){}
}

async function storageList(prefix, shared){
  // Toujours récupérer depuis l'historique Ably pour avoir les données fraîches
  if(_ablyReady){
    try{
      // Paginer si besoin — jusqu'à 1000 messages
      let page = await _ablyChannel('ecg:kv').history({limit:1000, direction:'backwards'});
      const seenKeys = new Set();
      do{
        for(const msg of (page?.items||[])){
          if(msg.name==='set' && msg.data?.key){
            const k = msg.data.key;
            // Ne prendre que le message le plus récent par clé (direction backwards = plus récent en premier)
            if(!seenKeys.has(k)){
              seenKeys.add(k);
              _kv[k] = msg.data.value;
            }
          }
        }
        if(page?.hasNext()) page = await page.next();
        else break;
      }while(page);
    }catch(e){}
  }
  return {keys: Object.keys(_kv).filter(k=>k.startsWith(prefix))};
}

// ══════════════════════════════════════════════════════════════════
//  HEARTBEAT — push stats uniquement, présence gérée par Ably
// ══════════════════════════════════════════════════════════════════
function _getAdaptiveInterval(){
  if(document.hidden) return POLL_INTERVAL_BG;
  if(_chatOpen)       return POLL_INTERVAL_ACTIVE;
  if(document.getElementById('sb-user-list')?.children.length>0) return POLL_INTERVAL_ACTIVE;
  return POLL_INTERVAL_NORMAL;
}

function sbStartHeartbeat(){
  if(_onlineHeartbeat) clearTimeout(_onlineHeartbeat);

  // Push immédiat
  sbPushMyStats();

  function _scheduleNext(){
    _onlineHeartbeat = setTimeout(async () => {
      if(_currentUser && _ablyReady) await sbPushMyStats();
      await _checkDuelInvitePoll();
      _scheduleNext();
    }, _getAdaptiveInterval());
  }
  _scheduleNext();

  if(!_presenceLifecycleBound){
    _presenceLifecycleBound = true;

    // Quitter la présence proprement dès que la page n'est plus réellement présente
    window.addEventListener('beforeunload', () => {
      if(_currentUser) _presenceLeave();
    });
    window.addEventListener('pagehide', () => {
      if(_currentUser) _presenceLeave();
    });

    // Présence = onglet visible + fenêtre active
    document.addEventListener('visibilitychange', () => {
      _syncPresenceFromVisibility();
    });
    window.addEventListener('focus', () => {
      _syncPresenceFromVisibility();
    });
    window.addEventListener('blur', () => {
      _syncPresenceFromVisibility();
    });
  }

  _syncPresenceFromVisibility();
}

// ─── Push stats ─────────────────────────────────────────────────
async function sbPushMyStats(extra={}){
  if(!_currentUser || !_ablyReady) return;
  if(_sbPushInProgress) return;
  _sbPushInProgress = true;
  try{
    const scores = {total: Math.round(mastPct(FICHES)*10)/10};
    Object.keys(DOMAINS).forEach(dk=>{
      scores[dk] = Math.round(mastPct(FICHES.filter(f=>f.domain===dk))*10)/10;
    });
    const prev = await storageGet(_currentUser.key, true);
    const prevData = prev ? JSON.parse(prev.value) : {};
    const dw = Math.max(prevData.duelsWon||0,  extra.duelsWon||0);
    const dp = Math.max(prevData.duelsPlayed||0, extra.duelsPlayed||0);
    const userData = {
      name:      _currentUser.name,
      color:     _currentUser.color,
      pwHash:    _currentUser.pwHash||prevData.pwHash||'',
      lastSeen:  Date.now(),
      updatedAt: Date.now(),
      online:    _isPagePresent(),
      scoreboardActive: true,
      scores,
      streak:      getStreak(),
      bestStreak:  Math.max(_getStoredBestStreak(), prevData.bestStreak||0, _sessionBestStreak||0),
      mastered:    mastCount(FICHES),
      totalFiches: FICHES.length,
      duelsWon:  dw,
      duelsPlayed: dp,
      mastery:   MASTERY,
    };
    await storageSet(_currentUser.key, JSON.stringify(userData), true);
    if(!_sbUserIndexed){
      const idxRaw = await storageGet('ecg_math_users:index', true);
      const idx    = idxRaw ? JSON.parse(idxRaw.value) : {keys:[]};
      if(!idx.keys.includes(_currentUser.key)){
        idx.keys.push(_currentUser.key);
        await storageSet('ecg_math_users:index', JSON.stringify(idx), true);
      }
      _sbUserIndexed = true;
    }
  }catch(e){}finally{ _sbPushInProgress = false; }
}

function _upsertScoreboardUser(u, forceRender=false){
  if(!u?.name) return;
  if(u.scoreboardActive === false){
    _usersCache = _usersCache.filter(x=>x.name!==u.name);
  } else {
    const idx = _usersCache.findIndex(x=>x.name===u.name);
    if(idx>=0) _usersCache[idx] = u;
    else _usersCache.push(u);
    _usersCache = _usersCache.filter(x=>x && x.name && x.scoreboardActive !== false);
  }
  _usersCache.sort((a,b)=>(b.scores?.total||0)-(a.scores?.total||0));
  _usersCacheTs = Date.now();
  const sbContent = document.getElementById('sb-content');
  if(sbContent && _currentView === 'scoreboard' && forceRender){
    sbRenderList(sbContent, _usersCache);
  } else if(sbContent && _currentView === 'scoreboard'){
    sbRenderList(sbContent, _usersCache);
  } else {
    _patchScoreboardRow(u);
  }
}

async function _hydrateScoreboardUserByName(name, attempt=0){
  if(!name) return;
  try{
    const raw = await storageGet(sbUserKey(name), true);
    if(raw){
      const u = JSON.parse(raw.value);
      if(u?.name) { _upsertScoreboardUser(u, true); return; }
    }
  }catch(e){}
  if(attempt < 3){
    setTimeout(()=>{ _hydrateScoreboardUserByName(name, attempt+1); }, [500, 1200, 2500][attempt] || 2500);
  }
}

function _onAblyUserUpdate(value){
  try{
    const u = JSON.parse(value);
    if(!u?.name) return;
    _upsertScoreboardUser(u, true);
  }catch(e){}
}

async function _fetchAllUsers(force=false){
  if(!_ablyReady) return _usersCache;
  const now = Date.now();
  if(!force && _usersCache.length && (now-_usersCacheTs)<USERS_CACHE_TTL) return _usersCache;
  try{
    const listResult = await storageList('ecg_math_users:', true);
    const idxRaw = await storageGet('ecg_math_users:index', true).catch(()=>null);

    const keySet = new Set((listResult?.keys||[]).filter(k => k !== 'ecg_math_users:index'));
    if(idxRaw){
      try{
        const idx = JSON.parse(idxRaw.value);
        (idx.keys||[]).forEach(k => { if(k && k !== 'ecg_math_users:index') keySet.add(k); });
      }catch(e){}
    }
    // Filet de sécurité : les membres actuellement en présence doivent aussi être cherchés.
    Object.keys(_presenceMembers).forEach(name => keySet.add(sbUserKey(name)));
    if(_currentUser?.name) keySet.add(sbUserKey(_currentUser.name));

    const keys = Array.from(keySet);
    if(!keys.length){
      _usersCache = [];
      _usersCacheTs = now;
      const sbContent = document.getElementById('sb-content');
      if(sbContent && _currentView === 'scoreboard') sbRenderList(sbContent, _usersCache);
      return _usersCache;
    }

    const raws = await Promise.all(keys.map(k=>storageGet(k,true).catch(()=>null)));
    const byName = new Map();
    raws.forEach(raw=>{
      if(!raw) return;
      try{
        const u = JSON.parse(raw.value);
        if(!u?.name) return;
        const prev = byName.get(u.name);
        const uts = u.updatedAt || u.lastSeen || 0;
        const pts = prev ? (prev.updatedAt || prev.lastSeen || 0) : -1;
        if(!prev || uts >= pts) byName.set(u.name, u);
      }catch(e){}
    });

    const users = Array.from(byName.values()).filter(u => u.scoreboardActive !== false);
    _usersCache = users.sort((a,b)=>(b.scores?.total||0)-(a.scores?.total||0));
    _usersCacheTs = now;
    const sbContent = document.getElementById('sb-content');
    if(sbContent && _currentView === 'scoreboard') sbRenderList(sbContent, _usersCache);
  }catch(e){}
  return _usersCache;
}

// Marque offline dans le KV (appelé par sbLogout uniquement)
async function sbSetOffline(){

  }catch(e){}
}

async function sbLogin(name, password=''){
  if(!name?.trim()) return false;
  name = name.trim().slice(0,20);
  const key = sbUserKey(name);

  let pwHash = '';
  if(password){
    pwHash = password.startsWith('__hash__') ? password.slice(8) : await _hashPassword(password);
  }

  let color, existingPwHash='', existingData={};
  try{
    const res = await storageGet(key, true);
    if(res){
      existingData     = JSON.parse(res.value);
      color            = existingData.color;
      existingPwHash   = existingData.pwHash||'';
    }
  }catch(e){}

  if(existingPwHash && pwHash !== existingPwHash){
    _showLoginError('Mot de passe incorrect.');
    return false;
  }
  if(!color){
    const idx = Math.abs(name.split('').reduce((a,ch)=>a+ch.charCodeAt(0),0)) % USER_COLORS.length;
    color = USER_COLORS[idx];
  }

  _currentUser = {name, color, key, pwHash};
  localStorage.setItem('ecg_math_username', name);
  if(pwHash) localStorage.setItem('ecg_math_pwhash', pwHash);

  // Sync mastery depuis cloud
  if(existingData.mastery){
    try{
      Object.keys(existingData.mastery).forEach(fid=>{
        const local = MASTERY[fid]||{pts:0};
        const cloud = existingData.mastery[fid];
        if((cloud.pts||0)>(local.pts||0)) MASTERY[fid]=cloud;
      });
      saveMastery(); updateUI();
    }catch(e){}
  }

  _sbUserIndexed = false;
  updateSbUI();
  document.getElementById('sb-login-modal')?.remove();
  if(_currentView==='scoreboard') go('scoreboard');

  // Connexion instantanée : présence réelle de page + stats en parallèle
  Promise.all([_syncPresenceFromVisibility(), sbPushMyStats()]).catch(()=>{});
  sbStartHeartbeat();
  // Charger l'historique chat pour cet utilisateur
  _loadChatHistory();
  chatRenderFooter();
  return true;
}

function _showLoginError(msg){
  const err = document.getElementById('sb-login-error');
  if(err){ err.textContent=msg; err.style.display='block'; }
}

async function sbLogout(){
  if(_currentUser){
    const prevUser = {..._currentUser};
    await _presenceLeave(); // quitte la présence Ably immédiatement

    // Masquer du scoreboard uniquement sur déconnexion explicite
    try{
      const prev = await storageGet(prevUser.key, true);
      const prevData = prev ? JSON.parse(prev.value) : {};
      await storageSet(prevUser.key, JSON.stringify({
        ...prevData,
        name: prevUser.name,
        color: prevUser.color,
        pwHash: prevData.pwHash || prevUser.pwHash || '',
        online: false,
        scoreboardActive: false,
        lastSeen: Date.now(),
        updatedAt: Date.now()
      }), true);
    }catch(e){}

    // Retirer du cache local immédiatement
    _usersCache = _usersCache.filter(u=>u.name!==prevUser.name);
  }
  _currentUser = null;
  localStorage.removeItem('ecg_math_username');
  localStorage.removeItem('ecg_math_pwhash');
  _sbUserIndexed = false;
  if(_onlineHeartbeat){ clearTimeout(_onlineHeartbeat); _onlineHeartbeat=null; }
  updateSbUI();
  chatRenderFooter();
  if(_currentView==='scoreboard') go('scoreboard');
}

async function initUser(){
  await ablyInit();
  // Bootstrap 1 : localStorage (instantané)
  _bootstrapKVFromLocalStorage();
  // Bootstrap 2 : Ably history (pour voir les autres users, pas juste soi)
  if(_ablyReady){
    try{
      let page = await _ablyChannel('ecg:kv').history({limit:1000, direction:'backwards'});
      const seenKeys = new Set(Object.keys(_kv));
      do{
        for(const msg of (page?.items||[])){
          if(msg.name==='set' && msg.data?.key && !seenKeys.has(msg.data.key)){
            seenKeys.add(msg.data.key);
            _kv[msg.data.key] = msg.data.value;
          }
        }
        if(page?.hasNext()) page = await page.next();
        else break;
      }while(page);
    }catch(e){ console.warn('[initUser] Ably bootstrap error:', e); }
  }
  const saved   = localStorage.getItem('ecg_math_username');
  const savedPw = localStorage.getItem('ecg_math_pwhash')||'';
  if(saved){
    if(_ablyReady){ await sbLogin(saved, savedPw ? '__hash__'+savedPw : ''); }
    else{
      const colorIdx = Math.abs(saved.split('').reduce((a,ch)=>a+ch.charCodeAt(0),0)) % USER_COLORS.length;
      _currentUser = {name:saved, color:USER_COLORS[colorIdx], key:sbUserKey(saved), pwHash:savedPw};
      updateSbUI();
    }
  }
  if(_ablyReady){ updateOnlineCount(); }
}

// ══════════════════════════════════════════════════════════════════
//  CHAT — pub/sub Ably pur (plus de KV pour le chat)
//  • Envoyer = publish sur ecg:chat
//  • Recevoir = subscribe sur ecg:chat
//  • Historique = Ably message history (72h)
//  • TTL local : on garde 5h en mémoire
// ══════════════════════════════════════════════════════════════════
const CHAT_KEY = 'ecg_math_chat:messages'; // gardé pour compat legacy
const CHAT_TTL = 5*60*60*1000;
const CHAT_MAX = 200;
let _chatMsgs=[], _chatOpen=false, _chatUnread=0, _chatLastSeen=0;
let _chatHistoryLoaded = false;

const CHAT_BAD=['putain','merde','connard','connasse','salope','pute','enculé','fdp','ntm','tg'];
function chatModerate(text){
  let t = text.trim().slice(0,240);
  CHAT_BAD.forEach(w=>{ t=t.replace(new RegExp(w,'gi'), w[0]+'*'.repeat(w.length-1)); });
  return t;
}

function _chatMarkRead(){
  _chatUnread = 0;
  if(_chatMsgs.length) _chatLastSeen = _chatMsgs[_chatMsgs.length-1].ts;
  _chatRefreshBadge();
}

function _chatRefreshBadge(){
  const badge    = document.getElementById('chat-badge');
  const btn      = document.getElementById('chat-toggle-btn');
  const navBadge = document.getElementById('chat-badge-nav');
  if(_chatUnread>0){
    if(badge){ badge.style.display='block'; badge.textContent=_chatUnread>9?'9+':_chatUnread; }
    if(btn) btn.classList.add('has-unread');
    if(navBadge){ navBadge.style.display='inline-block'; navBadge.textContent=_chatUnread>9?'9+':_chatUnread; }
  } else {
    if(badge) badge.style.display='none';
    if(btn) btn.classList.remove('has-unread');
    if(navBadge) navBadge.style.display='none';
  }
}

// Charger l'historique Ably (appelé au démarrage et au login)
async function _loadChatHistory(){
  if(!_ablyReady || _chatHistoryLoaded) return;
  try{
    const ch   = _ablyChannel('ecg:chat');
    const page = await ch.history({limit: CHAT_MAX, direction:'backwards'});
    const items = (page?.items||[]).reverse(); // du plus ancien au plus récent
    const now  = Date.now();
    items.forEach(msg => {
      const m = msg.data;
      if(!m || !m.ts || !m.author) return;
      if((now - m.ts) >= CHAT_TTL) return; // ignorer les trop vieux
      const exists = _chatMsgs.some(x=>x.ts===m.ts && x.author===m.author);
      if(!exists) _chatMsgs.push(m);
    });
    _chatMsgs.sort((a,b)=>a.ts-b.ts);
    _chatMsgs = _chatMsgs.slice(-CHAT_MAX);
    _chatHistoryLoaded = true;
    if(_chatOpen) chatRenderMessages();
    // Compter les non-lus
    const me = _currentUser?.name;
    const unread = _chatMsgs.filter(m=>m.ts>_chatLastSeen&&m.author!==me).length;
    if(unread>0){ _chatUnread=unread; _chatRefreshBadge(); }
  }catch(e){ console.warn('[Chat] history load error:', e); }
}

function chatOpen(){

function chatClose(){
  _chatOpen = false;
  document.getElementById('chat-panel').classList.remove('open');

function chatRenderMessages(){
  const container = document.getElementById('chat-messages');
  if(!container) return;
  const me = _currentUser?.name;
  if(!_chatMsgs.length){
    container.innerHTML = `<div class="chat-empty">Aucun message.<br>Sois le premier !</div>`;
    return;
  }
  const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
  const GROUP_GAP = 3*60*1000;
  let html = '';
  _chatMsgs.forEach((m, idx)=>{
    const isMe = m.author === me;
    const prev = _chatMsgs[idx-1];
    const isGrouped = prev && prev.author===m.author && (m.ts-prev.ts)<GROUP_GAP;
    const timeStr = new Date(m.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const colorStyle = m.color ? `background:${m.color}` : 'background:var(--t4)';
    if(isGrouped){
      html += `<div class="chat-msg${isMe?' me':''}" style="margin-top:2px"><div class="chat-bubble">${m.text}</div></div>`;
    } else {
      html += `<div class="chat-msg${isMe?' me':''}" style="margin-top:10px">
        <div class="chat-msg-header">
          <div class="chat-msg-avatar" style="${colorStyle}">${m.author[0].toUpperCase()}</div>
          <span class="chat-msg-name">${isMe?'Vous':m.author}</span>
          <span class="chat-msg-time">${timeStr}</span>
        </div>
        <div class="chat-bubble">${m.text}</div>
      </div>`;
    }
  });
  container.innerHTML = html;
  if(wasAtBottom || _chatMsgs.length<=3) container.scrollTop = container.scrollHeight;
}

function chatRenderFooter(){
  const footer = document.getElementById('chat-footer');
  if(!footer) return;
  if(!_currentUser){
    footer.innerHTML = `<div class="chat-login-hint">Connecte-toi pour participer au chat.</div>`;
    return;
  }
  footer.innerHTML = `<div class="chat-input-row">
    <textarea class="chat-input" id="chat-input" placeholder="Écris un message…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chatSend();}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
    <button class="chat-send" id="chat-send-btn" onclick="chatSend()">➤</button>
  </div>
  <div style="font-family:var(--ff-mono);font-size:8px;color:var(--t5);margin-top:5px;text-align:center">Messages conservés 72h</div>`;
}

async function chatSend(){
  if(!_currentUser || !_ablyReady) return;
  const input = document.getElementById('chat-input');
  if(!input) return;
  const raw = chatModerate(input.value);
  if(!raw){ input.value=''; return; }
  const btn = document.getElementById('chat-send-btn');
  if(btn) btn.disabled = true;
  input.value = ''; input.style.height = 'auto';
  try{
    const msg = {ts: Date.now(), author: _currentUser.name, color: _currentUser.color, text: raw};
    // Publier sur le canal Ably — reçu instantanément par tous via subscribe
    await _ablyChannel('ecg:chat').publish('msg', msg);
    // Ajouter localement immédiatement (avant de le recevoir en retour)
    const exists = _chatMsgs.some(x=>x.ts===msg.ts&&x.author===msg.author);
    if(!exists){
      _chatMsgs.push(msg);
      _chatMsgs = _chatMsgs.slice(-CHAT_MAX);
      _chatLastSeen = msg.ts;
      chatRenderMessages();
    }
  }catch(e){ console.warn('[Chat] send error:', e); }
  finally{ if(btn) btn.disabled=false; input.focus(); }
}

  const data=await loadReactions(ficheId);

  const idx=data.reactions[emoji].indexOf(_currentUser.name);
  if(idx>=0) data.reactions[emoji].splice(idx,1); else data.reactions[emoji].push(_currentUser.name);
  await saveReactions(ficheId,data);
  injectReactions(ficheId);
}
async function addNote(ficheId,text){
  if(!_currentUser||!text.trim()) return;
  const data=await loadReactions(ficheId);
  if(!data.notes) data.notes=[];
  data.notes.push({author:_currentUser.name,color:_currentUser.color,text:text.trim().slice(0,120),ts:Date.now()});
  if(data.notes.length>20) data.notes=data.notes.slice(-20);
  await saveReactions(ficheId,data);
  injectReactions(ficheId);
}
async function injectReactions(ficheId){
  const sid=ficheId.replace(/[^a-z0-9]/gi,'_');
  const container=document.getElementById('react-container-'+sid); if(!container) return;
  const data=await loadReactions(ficheId);
  const me=_currentUser?.name;
  const btns=REACT_EMOJIS.map(e=>{
    const users=data.reactions?.[e]||[];
    const mine=users.includes(me);
    return `<button class="react-btn${mine?' mine':''}" onclick="toggleReact('${ficheId}','${e}')">${e}${users.length?`<span class="react-count">${users.length}</span>`:''}</button>`;
  }).join('');
  const notes=(data.notes||[]).map(n=>`<div class="react-note-item"><span class="react-note-author" style="color:${n.color||'var(--navy)'}">${n.author}</span><span class="react-note-text">${n.text}</span></div>`).join('');
  container.innerHTML=`<div class="react-bar">${btns}</div>${notes?`<div class="react-notes">${notes}</div>`:''}
  <div class="react-note-add">
    <input class="react-note-input" id="react-input-${sid}" type="text" placeholder="${_currentUser?'Laisser une note…':'Connecte-toi pour noter'}" maxlength="120" ${!_currentUser?'disabled':''} onkeydown="if(event.key==='Enter'&&this.value.trim()){addNote('${ficheId}',this.value);this.value='';}">
    <button class="qnbtn" style="font-size:10px;padding:5px 10px" onclick="const i=document.getElementById('react-input-${sid}');if(i&&i.value.trim()){addNote('${ficheId}',i.value);i.value='';}">Envoyer</button>
  </div>`;
}

let SEARCH_INDEX = [];
const SEARCH_SYNONYMS = {
  va:['variable aleatoire'],
  var:['variable aleatoire'],
  fdr:['fonction repartition'],
  lgn:['loi faible des grands nombres'],
  sce:['systeme complet evenements'],
  sev:['systeme complet evenements'],
  edl:['equation differentielle lineaire'],
  edo:['equation differentielle'],
  mat:['matrice'],
  vp:['valeur propre'],
  vect:['vecteur'],
  proba:['probabilite'],
  probas:['probabilites'],
  markov:['chaine de markov'],
  densite:['variable aleatoire a densite'],
  python:['annales python quiz']
};
function _decodeHtmlEntities(str){
  const el=document.createElement('textarea');
  el.innerHTML=String(str||'');
  return el.value;
}
function normalizeSearchText(str){
  return _decodeHtmlEntities(String(str||''))
    .replace(/<[^>]*>/g,' ')
    .replace(/\\mathbb\s*\{?R\}?/gi,' reels ')
    .replace(/\\mathbb\s*\{?N\}?/gi,' naturels ')
    .replace(/\\mathbb\s*\{?Z\}?/gi,' entiers ')
    .replace(/\\mathbb\s*\{?Q\}?/gi,' rationnels ')
    .replace(/\\mathbb\s*\{?C\}?/gi,' complexes ')
    .replace(/\\mathcal\s*\{?C\}?/gi,' classe c ')
    .replace(/\\(?:leq|le)/gi,' inferieur egal ')
    .replace(/\\(?:geq|ge)/gi,' superieur egal ')
    .replace(/\\neq/gi,' different ')
    .replace(/\\to/gi,' vers ')
    .replace(/\\infty/gi,' infini ')
    .replace(/\\sum/gi,' somme ')
    .replace(/\\prod/gi,' produit ')
    .replace(/\\cap/gi,' intersection ')
    .replace(/\\cup/gi,' union ')
    .replace(/\\subseteq/gi,' inclus ')
    .replace(/\\subset/gi,' inclus strict ')
    .replace(/\\iff/gi,' equivalence ')
    .replace(/\\Rightarrow|\\implies/gi,' implique ')
    .replace(/\\operatorname\s*\{([^}]*)\}/gi,' $1 ')
    .replace(/\\mathrm\s*\{([^}]*)\}/gi,' $1 ')
    .replace(/\\text\s*\{([^}]*)\}/gi,' $1 ')
    .replace(/\\[a-zA-Z]+/g,' ')
    .replace(/[{}\[\]_^$()=+*,:;!?"'`~|<>≤≥→↦∞]/g,' ')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\bch\.?\s*(\d+)/gi,' chapitre $1 ')
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}
function stripSearchText(str){ return normalizeSearchText(str); }
function uniqueWords(arr){ return Array.from(new Set(arr.filter(Boolean))); }
function tokenizeSearchQuery(str){
  const base=normalizeSearchText(str);
  if(!base) return [];
  return uniqueWords(base.split(' ').filter(tok=>tok.length>=2));
}
function expandSearchTokens(tokens){
  const out=[];
  tokens.forEach(tok=>{
    out.push(tok);
    if(SEARCH_SYNONYMS[tok]) out.push(...SEARCH_SYNONYMS[tok]);
    if(tok.endsWith('s') && tok.length>4) out.push(tok.slice(0,-1));
    if(tok.endsWith('es') && tok.length>5) out.push(tok.slice(0,-2));
  });
  return uniqueWords(out.flatMap(t=>tokenizeSearchQuery(t)));
}
function chapterLabel(f){
  const dom=DOMAINS[f.domain];
  return (dom&&dom.chapters&&dom.chapters[f.chapter]) ? dom.chapters[f.chapter] : (f.chapter||'');
}
function buildSearchIndex(){
  SEARCH_INDEX=FICHES.map(f=>{
    const title=normalizeSearchText(f.title);
    const summary=normalizeSearchText(f.summary);
    const conditions=normalizeSearchText((f.conditions||[]).join(' '));
    const body=normalizeSearchText(f.body||'');
    const quizzes=normalizeSearchText((f.quizzes||[]).map(q=>[
      q.q||q.prompt||q.question||'',
      q.context||'',
      q.visual||'',
      (q.options||[]).map(o=>o.text||'').join(' '),
      q.correct||''
    ].join(' ')).join(' '));
    const chapter=normalizeSearchText(chapterLabel(f));
    const domain=normalizeSearchText((DOMAINS[f.domain]||{}).name||f.domain);
    const type=normalizeSearchText(TYPE_LABELS[f.type]||f.type);
    const aliases=normalizeSearchText([
      title.includes('variable aleatoire')?'va':'',
      title.includes('fonction repartition')?'fdr':'',
      title.includes('loi faible des grands nombres')?'lgn':'',
      title.includes('equation differentielle')?'edl':'',
      title.includes('markov')?'markov':'',
      chapter,domain,type
    ].join(' '));
    const corpus=[title,summary,conditions,body,quizzes,chapter,domain,type,aliases].join(' ');
    const words=uniqueWords(corpus.split(' ').filter(w=>w.length>=2));
    return {fiche:f,title,summary,conditions,body,quizzes,chapter,domain,type,aliases,corpus,words};
  });
}
function isEditDistanceAtMostOne(a,b){
  if(a===b) return true;
  if(Math.abs(a.length-b.length)>1) return false;
  let i=0,j=0,edits=0;
  while(i<a.length && j<b.length){
    if(a[i]===b[j]){ i++; j++; continue; }
    edits++; if(edits>1) return false;
    if(a.length>b.length) i++;
    else if(b.length>a.length) j++;
    else { i++; j++; }
  }
  if(i<a.length || j<b.length) edits++;
  return edits<=1;
}
function approxWordScore(token, words){
  if(!token || token.length<3) return 0;
  for(const w of words){
    if(w===token) return 0;
    if(w.startsWith(token) || token.startsWith(w)) return 7;
    if(token.length>=4 && isEditDistanceAtMostOne(w,token)) return 5;
  }
  return 0;
}
function scoreSearchEntry(entry, query){
  const phrase=query.norm;
  const tokens=query.tokens;
  if(!phrase) return 0;
  let score=0;
  if(entry.title===phrase) score+=240;
  else if(entry.title.startsWith(phrase)) score+=170;
  else if(entry.title.includes(phrase)) score+=125;
  if(entry.summary.includes(phrase)) score+=70;
  if(entry.conditions.includes(phrase)) score+=76;
  if(entry.chapter.includes(phrase)) score+=58;
  if(entry.domain.includes(phrase)) score+=44;
  if(entry.aliases.includes(phrase)) score+=52;
  if(entry.quizzes.includes(phrase)) score+=40;
  if(entry.body.includes(phrase)) score+=26;
  let hits=0;
  tokens.forEach(tok=>{
    let tokScore=0;
    if(entry.title.split(' ').includes(tok)) tokScore+=38;
    else if(entry.title.includes(tok)) tokScore+=30;
    if(entry.summary.includes(tok)) tokScore+=18;
    if(entry.conditions.includes(tok)) tokScore+=20;
    if(entry.chapter.includes(tok)) tokScore+=14;
    if(entry.domain.includes(tok)) tokScore+=10;
    if(entry.quizzes.includes(tok)) tokScore+=13;
    if(entry.body.includes(tok)) tokScore+=7;
    if(!tokScore) tokScore+=approxWordScore(tok,entry.words);
    if(tokScore>0) hits++;
    score+=tokScore;
  });
  if(tokens.length && hits===tokens.length) score+=42;
  else if(hits) score+=hits*8;
  return score;
}
function runSmartSearch(rawQuery, opts={}){
  if(!SEARCH_INDEX.length) buildSearchIndex();
  const norm=normalizeSearchText(rawQuery);
  const tokens=expandSearchTokens(tokenizeSearchQuery(rawQuery));
  if(!norm && !tokens.length) return [];
  const limit=opts.limit||12;
  const domain=opts.domain||null;
  const chapter=opts.chapter||null;
  const query={norm,tokens};
  return SEARCH_INDEX
    .filter(entry=>(!domain || entry.fiche.domain===domain) && (!chapter || entry.fiche.chapter===chapter))
    .map(entry=>({entry,fiche:entry.fiche,score:scoreSearchEntry(entry,query)}))
    .filter(item=>item.score>0)
    .sort((a,b)=>b.score-a.score || a.fiche.title.localeCompare(b.fiche.title,'fr'))
    .slice(0,limit);
}
function getSearchSnippet(f){
  const raw=f.summary || (f.conditions&&f.conditions[0]) || stripSearchText(f.body||'') || '';
  const txt=String(raw||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
  return txt.length>120 ? txt.slice(0,117)+'…' : txt;
}
function sbSearchInput(val){
  const clear=document.getElementById('sb-search-clear'); if(clear) clear.style.display=val?'':'none';
  const res=document.getElementById('sb-search-results'); if(!res) return;
  if(!String(val||'').trim()){ res.innerHTML=''; res.style.display='none'; return; }
  const matches=runSmartSearch(val,{limit:12});
  if(!matches.length){
    res.innerHTML='<div class="sbsr-empty">Aucun résultat — essaie un mot-clé voisin, une abréviation comme « va », « fdr », « edl » ou le nom d’un chapitre.</div>';

  }
  res.innerHTML=matches.map(({fiche:f})=>{
    const dom=DOMAINS[f.domain];

    const chapter=chapterLabel(f);
    return `<div class="sbsr-item" onclick="sbSearchSelect('${f.id}')">

        <div class="sbsr-sub" style="margin-top:2px;color:var(--t4)">${sanitizeMathText(getSearchSnippet(f))}</div>
      </div>
    </div>`;
  }).join('');
  res.style.display='block';
  renderMathIn(res);
}

function decodeHtmlEntitiesLite(str){
  if(typeof str!=='string') return str;
  return str
    .replace(/&gt;/g,'>')
    .replace(/&lt;/g,'<')
    .replace(/&amp;/g,'&')
    .replace(/&#x27;/g,"'")
    .replace(/&quot;/g,'"')
    .replace(/&#39;/g,"'")
    .replace(/&nbsp;/g,' ');
}

function repairBrokenMathSyntax(str){
  if(typeof str!=='string') return str;
  return str
    .replace(/\\exists!\s*,/g,'\\exists!\\,')
    .replace(/\\,\s*\\ldots\s*\\,/g,', \\ldots, ')
    .replace(/\\,\s*\\cdots\s*\\,/g,', \\cdots, ')
    .replace(/\\,\s*\\ldots/g,', \\ldots')
    .replace(/\\,\s*\\cdots/g,', \\cdots')
    .replace(/\[\s*\\\(([^()]*)\\\)\s*\]/g,'[$1]')
    .replace(/\[\s*\\\(([^()]*)\]/g,'[$1]')
    .replace(/\[([^\[\]]*?)\\\)\s*\]/g,'[$1]')
    .replace(/\\\(\s*\\alpha_([^)]*)\\\)/g,'\\(\\alpha_$1\\)')
    .replace(/\\\(\s*\\beta_([^)]*)\\\)/g,'\\(\\beta_$1\\)')
    .replace(/\\\(\s*\\lambda_([^)]*)\\\)/g,'\\(\\lambda_$1\\)');
}

function normalizeMathCommands(str){
  if(typeof str!=='string') return str;
  return repairBrokenMathSyntax(str)
    .replace(/\u0008/g,'\\b')
    .replace(/\u000c/g,'\\f')
    .replace(/\u0000/g,'')
    .replace(/\\[bf]\\(?=[A-Za-z])/g,'\\')
    .replace(/\\\s+dots\b/g,'\\dots')
    .replace(/\\\s+vdots\b/g,'\\vdots')
    .replace(/\\\s+ldots\b/g,'\\ldots')
    .replace(/\u0008oldsymbol/g,'\\boldsymbol')
    .replace(/\u000crac/g,'\\frac')
    .replace(/\u0007lpha/g,'\\alpha')
    .replace(/\u0008eta/g,'\\beta')
    .replace(/\u0008inom/g,'\\binom')
    .replace(/\u0008igcup/g,'\\bigcup')
    .replace(/\u000barnothing/g,'\\varnothing')
    .replace(/\\boldsymbol\s*\{?1\}?/g,'\\mathbf{1}')
    .replace(/\\mathbf\s*1/g,'\\mathbf{1}');
}

function normalizeUnicodeMathText(str){
  if(typeof str!=='string') return str;
  const subMap={'₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9','ₙ':'n','ᵢ':'i'};
  const subToLatex = s => Array.from(s).map(ch=>subMap[ch]||ch).join('');
  return str
    .replace(/λ([₀₁₂₃₄₅₆₇₈₉ₙᵢ]+)/g, (_,s)=>`\\lambda_${subToLatex(s)}`)
    .replace(/([A-Za-z])([₀₁₂₃₄₅₆₇₈₉ₙᵢ]+)/g, (_,a,s)=>`${a}_${subToLatex(s)}`)
    .replace(/ℝ/g,'\\mathbb{R}')
    .replace(/ℕ/g,'\\mathbb{N}')
    .replace(/ℤ/g,'\\mathbb{Z}')
    .replace(/ℚ/g,'\\mathbb{Q}');
}

function latexifyExpression(expr){
  if(typeof expr!=='string') return expr;
  return normalizeUnicodeMathText(normalizeMathCommands(expr))
    .replace(/→/g,'\\to ')
    .replace(/↦/g,'\\mapsto ')
    .replace(/∞/g,'\\infty')
    .replace(/≤/g,'\\le ')
    .replace(/≥/g,'\\ge ')
    .replace(/∈/g,'\\in ')
    .replace(/∉/g,'\\notin ')
    .replace(/⊂/g,'\\subset ')
    .replace(/⊆/g,'\\subseteq ')
    .replace(/⊄/g,'\\not\\subset ')
    .replace(/·/g,'\\cdot ')
    .replace(/Σ/g,'\\sum ')
    .replace(/ℓ/g,'\\ell')
    .replace(/⟺/g,'\\iff ')
    .replace(/⇒/g,'\\Rightarrow ')
    .replace(/([A-Za-z]+)_\{([^}]+)\}/g,'$1_{$2}')
    .replace(/([A-Za-z]+)_([A-Za-z0-9+\-]+)/g,'$1_$2')
    .replace(/(\d+)\s*\/\s*\(([^()]+)\)/g,'\\frac{$1}{$2}')
    .replace(/(\d+)\s*\/\s*(\d+)/g,'\\frac{$1}{$2}')
    .replace(/\s+/g,' ')
    .trim();
}

function wrapInlineMath(expr){
  const cleaned = latexifyExpression(expr).replace(/^\$+|\$+$/g,'').trim();
  return cleaned ? `$${cleaned}$` : expr;
}

function normalizeExistingMath(part){
  if(typeof part!=='string' || !part) return part;
  part = decodeHtmlEntitiesLite(part);
  if(/^\\\([\s\S]*\\\)$/.test(part)) return `\\(${latexifyExpression(part.slice(2,-2))}\\)`;
  if(/^\\\[[\s\S]*\\\]$/.test(part)) return `\\[${latexifyExpression(part.slice(2,-2))}\\]`;
  if(/^\$\$[\s\S]*\$\$$/.test(part)) return `$$${latexifyExpression(part.slice(2,-2))}$$`;
  if(/^\$[^$]+\$$/.test(part)) return `$${latexifyExpression(part.slice(1,-1))}$`;
  return latexifyExpression(part);
}

function processPlainMathText(part){
  let s = decodeHtmlEntitiesLite(normalizeUnicodeMathText(normalizeMathCommands(part)));
  const stash=[];
  const keep = value => `\u0000${stash.push(value)-1}\u0000`;
  const protectReplace = (re, builder) => {
    s = s.replace(re, function(){
      return keep(builder.apply(null, arguments));
    });
  };

  protectReplace(/\{[^{}\n]*[∈|][^{}\n]*\}/g, m=>wrapInlineMath(m));
  protectReplace(/lim_\{[^}]+\}\s*[^.;!?<\n]+/g, m=>wrapInlineMath(m));
  protectReplace(/\b[pP]\([^)]*\)\s*=\s*P\([^)]*\)/g, m=>wrapInlineMath(m));
  protectReplace(/\b[A-Za-z]\([^)]*\)\s*=\s*o\([^)]*\)/g, m=>wrapInlineMath(m));
  protectReplace(/[A-Za-z0-9_{}\\()]+(?:\s*[+\-]\s*(?:\d+)?[A-Za-z0-9_{}\\()]+)+\s*=\s*[A-Za-z0-9_{}\\()/+\-]+/g, m=>wrapInlineMath(m));
  protectReplace(/(?:[A-Za-z]+_\{[^}]+\}(?:\([^)]*\))?|[A-Za-z]+_[A-Za-z0-9+\-]+(?:\([^)]*\))?|\\(?:mathbb\{[A-Z]\}|lambda(?:_\{[^}]+\}|_[A-Za-z0-9+\-]+)|[A-Za-z]+(?:\{[^}]+\})?))(?:\s*(?:,|\\dots|=|\+|-|<|>|≤|≥)\s*(?:[A-Za-z0-9]+(?:_\{[^}]+\}|_[A-Za-z0-9+\-]+)?(?:\([^)]*\))?|\\(?:mathbb\{[A-Z]\}|lambda(?:_\{[^}]+\}|_[A-Za-z0-9+\-]+)|[A-Za-z]+(?:\{[^}]+\})?)|\d+\/\([^()]+\)|\d+\/\d+))+/g, m=>wrapInlineMath(m));
  protectReplace(/\b([A-Za-z]+)_\{([^}]+)\}(?:\(([^()]*)\))?/g, (_,a,b,c)=>wrapInlineMath(`${a}_{${b}}${c!==undefined?`(${c})`:''}`));
  protectReplace(/\b([A-Za-z]+)_([A-Za-z0-9+\-]+)(?:\(([^()]*)\))?/g, (_,a,b,c)=>wrapInlineMath(`${a}_${b}${c!==undefined?`(${c})`:''}`));
  protectReplace(/\\mathbb\{([A-Z])\}/g, (_,a)=>wrapInlineMath(`\\mathbb{${a}}`));
  protectReplace(/\\lambda(?:_\{[^}]+\}|_[A-Za-z0-9+\-]+)/g, m=>wrapInlineMath(m));
  protectReplace(/(\d+)\s*\/\s*\(([^()]+)\)/g, (_,a,b)=>wrapInlineMath(`\\frac{${a}}{${b}}`));
  protectReplace(/(\d+)\s*\/\s*(\d+)/g, (_,a,b)=>wrapInlineMath(`\\frac{${a}}{${b}}`));
  protectReplace(/(^|[\s(])([+\-−]?∞)(?=($|[\s),;:.!?]))/g, (_,pre,m)=>`${pre}${wrapInlineMath(m)}`);
  protectReplace(/([A-Za-z][A-Za-z0-9_()]*)\s*([≤≥])\s*([A-Za-z0-9_+\-−]+)/g, (_,a,op,b)=>wrapInlineMath(`${a} ${op} ${b}`));

  s = s.replace(/\u0000(\d+)\u0000/g, (_,i)=>stash[+i]);
  return s;
}

function autoMathifyText(str){
  if(typeof str!=='string' || !str) return str;
  const tokenRe=/(<pre[\s\S]*?<\/pre>|<code[\s\S]*?<\/code>|<div[^>]*style="background:var\(--s2\)[^"]*"[\s\S]*?<\/div>|<[^>]+>|\\\[[\s\S]*?\\\]|\$\$[\s\S]*?\$\$|\\\([\s\S]*?\\\)|\$[^$]+\$)/g;
  const parts = str.split(tokenRe);
  return parts.map(part=>{
    if(!part) return part;
    if(/^<pre[\s\S]*<\/pre>$/.test(part) || /^<code[\s\S]*<\/code>$/.test(part)) return part;
    if(/^<[^>]+>$/.test(part)) return part;
    if(/^\\\[[\s\S]*\\\]$/.test(part) || /^\$\$[\s\S]*\$\$$/.test(part) || /^\\\([\s\S]*\\\)$/.test(part) || /^\$[^$]+\$$/.test(part)) return normalizeExistingMath(part);
    return processPlainMathText(part);
  }).join('');
}

function renderMarkdownCodeBlocks(str){
  if(typeof str!=='string') return str;
  str = str.replace(/```([a-zA-Z0-9_+-]*)\n?([\s\S]*?)```/g, function(_, lang, code){
    const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const langLabel = lang ? '<span style="font-family:var(--ff-mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);display:block;margin-bottom:4px">'+lang+'</span>' : '';
    return '<div style="background:var(--s2);border:1px solid var(--bd2);border-radius:6px;padding:10px 12px;margin:8px 0;overflow-x:auto">'+langLabel+'<pre style="margin:0;font-family:var(--ff-mono);font-size:12px;color:var(--t1);line-height:1.6;overflow-x:auto;white-space:pre"><code>'+escaped.trim()+'</code></pre></div>';
  });
  str = str.replace(/`([^`\n]+)`/g, function(_, code){
    const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<code style="font-family:var(--ff-mono);font-size:12px;background:var(--s3);padding:1px 5px;border-radius:3px;color:var(--t1)">'+escaped+'</code>';
  });
  return str;
}

function sanitizeMathText(str){
  if(typeof str!=='string') return str;
  return autoMathifyText(renderMarkdownCodeBlocks(str));
}

function renderMathIn(el){
  if(!el || typeof renderMathInElement === 'undefined') return;
  try {
    renderMathInElement(el, {

}

<script>
(function(){
  const ONLINE_PROFILES_CHANNEL = 'ecg:profiles:v1';
  const ONLINE_PRESENCE_CHANNEL = 'ecg:presence:v1';
  const ONLINE_DUELS_CHANNEL    = 'ecg:duels:v1';
  const ONLINE_CHAT_CHANNEL     = 'ecg:chat';
  const LOCAL_PROFILE_INDEX_KEY = '_ably_profile_index_v1';
  const LOCAL_PROFILE_PREFIX    = '_ably_profile_v1_';
  const LOCAL_PROFILE_CACHE_TTL = 60 * 1000;
  let _profilesHydrated = false;
  let _onlineReinitDone = false;

  function __normName(name){
    return String(name || '').trim().replace(/\s+/g,' ').slice(0,20);
  }
  function __profileLocalKey(name){
    return LOCAL_PROFILE_PREFIX + sbUserKey(name);
  }
  function __hashString(str){
    let h = 2166136261;
    const s = String(str || '');
    for(let i=0;i<s.length;i++){
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }
  function __shuffleWithRng(arr, rng){
    const out = arr.slice();
    for(let i=out.length-1;i>0;i--){
      const j = Math.floor(rng() * (i + 1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
  }
  function __loadProfileIndex(){
    try{
      const raw = localStorage.getItem(LOCAL_PROFILE_INDEX_KEY);
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    }catch(e){ return []; }
  }
  function __saveProfileIndex(index){
    try{ localStorage.setItem(LOCAL_PROFILE_INDEX_KEY, JSON.stringify(index.slice(-500))); }catch(e){}
  }
  function __saveProfileLocal(profile){
    if(!profile || !profile.name) return;
    try{
      localStorage.setItem(__profileLocalKey(profile.name), JSON.stringify(profile));
      const idx = __loadProfileIndex();
      if(!idx.includes(profile.name)) idx.push(profile.name);
      __saveProfileIndex(idx);
    }catch(e){}
  }
  function __removeProfileLocal(name){
    try{
      localStorage.removeItem(__profileLocalKey(name));
      __saveProfileIndex(__loadProfileIndex().filter(n => n !== name));
    }catch(e){}
  }
  function __loadLocalProfiles(){
    const out = [];
    __loadProfileIndex().forEach(name => {
      try{
        const raw = localStorage.getItem(__profileLocalKey(name));
        if(!raw) return;
        const profile = JSON.parse(raw);
        if(profile && profile.name) out.push(profile);
      }catch(e){}
    });
    return out;
  }
  function __mergeProfile(profile, opts){
    opts = opts || {};
    if(!profile || !profile.name) return null;
    const normalized = {
      name: __normName(profile.name),
      color: profile.color || USER_COLORS[Math.abs(__normName(profile.name).split('').reduce((a,ch)=>a+ch.charCodeAt(0),0)) % USER_COLORS.length],
      key: profile.key || sbUserKey(profile.name),
      pwHash: profile.pwHash || '',
      scores: profile.scores || {total:0, alg:0, ana:0, prob:0},
      streak: profile.streak || 0,
      bestStreak: profile.bestStreak || 0,
      mastered: profile.mastered || 0,
      totalFiches: profile.totalFiches || FICHES.length,
      duelsWon: profile.duelsWon || 0,
      duelsPlayed: profile.duelsPlayed || 0,
      mastery: profile.mastery || undefined,
      lastSeen: profile.lastSeen || 0,
      updatedAt: profile.updatedAt || profile.lastSeen || Date.now(),
      scoreboardActive: profile.scoreboardActive !== false,
      online: !!profile.online
    };

    if(opts.persist !== false) __saveProfileLocal(normalized);

    const idx = _usersCache.findIndex(u => u && u.name === normalized.name);
    if(idx >= 0){
      const prev = _usersCache[idx];
      const prevTs = prev ? (prev.updatedAt || prev.lastSeen || 0) : 0;
      const nextTs = normalized.updatedAt || normalized.lastSeen || 0;
      if(nextTs >= prevTs) _usersCache[idx] = Object.assign({}, prev, normalized);
    }else{
      _usersCache.push(normalized);
    }
    _usersCache = _usersCache.filter(u => u && u.name && u.scoreboardActive !== false);
    _usersCache.sort((a,b)=>(b.scores?.total||0)-(a.scores?.total||0) || ((b.bestStreak||0)-(a.bestStreak||0)) || a.name.localeCompare(b.name));
    _usersCacheTs = Date.now();

    if(_currentView === 'scoreboard'){
      const sbContent = document.getElementById('sb-content');
      if(sbContent) sbRenderList(sbContent, _usersCache);
    }
    return normalized;
  }

  async function __publishProfile(profile){
    const snapshot = Object.assign({}, profile, {
      name: __normName(profile.name),
      key: profile.key || sbUserKey(profile.name),
      updatedAt: Date.now(),
      lastSeen: Date.now()
    });
    __mergeProfile(snapshot, {persist:true});
    try{ await _ablyChannel(ONLINE_PROFILES_CHANNEL).publish('profile.upsert', snapshot); }catch(e){}
    try{ await storageSet(snapshot.key, JSON.stringify(snapshot), true); }catch(e){}
    return snapshot;
  }

  async function __loadProfilesFromLegacyKV(){
    try{
      const listResult = await storageList('ecg_math_users:', true);
      const keys = (listResult?.keys || []).filter(k => k && k !== 'ecg_math_users:index');
      const raws = await Promise.all(keys.map(k => storageGet(k, true).catch(()=>null)));
      raws.forEach(raw => {
        if(!raw) return;
        try{
          const profile = JSON.parse(raw.value);
          if(profile && profile.name) __mergeProfile(profile, {persist:true});
        }catch(e){}
      });
    }catch(e){}
  }

  async function __loadProfilesFromHistory(force){
    const now = Date.now();
    if(_profilesHydrated && !force && _usersCache.length && (now - _usersCacheTs) < LOCAL_PROFILE_CACHE_TTL) return _usersCache;
    __loadLocalProfiles().forEach(profile => __mergeProfile(profile, {persist:false}));
    if(!_ablyReady) return _usersCache;
    try{
      let page = await _ablyChannel(ONLINE_PROFILES_CHANNEL).history({limit:1000, direction:'backwards'});
      const byName = new Map();
      do{
        for(const msg of (page?.items || [])){
          if(msg.name !== 'profile.upsert' || !msg.data?.name) continue;
          const profile = msg.data;
          const prev = byName.get(profile.name);
          const nextTs = profile.updatedAt || profile.lastSeen || 0;
          const prevTs = prev ? (prev.updatedAt || prev.lastSeen || 0) : -1;
          if(!prev || nextTs >= prevTs) byName.set(profile.name, profile);
        }
        if(page?.hasNext()) page = await page.next();
        else break;
      }while(page);
      Array.from(byName.values()).forEach(profile => __mergeProfile(profile, {persist:true}));
      _profilesHydrated = true;
    }catch(e){
      console.warn('[online] profile history load error:', e);
    }
    await __loadProfilesFromLegacyKV();
    return _usersCache;
  }

  _fetchAllUsers = async function(force){
    await __loadProfilesFromHistory(!!force);
    if(_currentUser?.name){
      const me = _usersCache.find(u => u.name === _currentUser.name);
      if(me && me.scoreboardActive !== false) __mergeProfile(me, {persist:false});
    }
    return _usersCache;
  }

  async function __syncPresenceMembers(){
    if(!_ablyReady) return;
    try{
      const members = await _ablyChannel(ONLINE_PRESENCE_CHANNEL).presence.get();
      _presenceMembers = {};
      (members || []).forEach(member => {
        if(member?.data?.name) _presenceMembers[member.data.name] = member.data;
      });
      updateOnlineCount();
    }catch(e){
      console.warn('[online] presence sync error:', e);
    }
  }

  _ablyChannel = function(name){
    if(!_ably) return null;
    if(!_ablyChannels[name]){
      const opts = name === ONLINE_PROFILES_CHANNEL ? {params:{rewind:'100'}} : {};
      _ablyChannels[name] = _ably.channels.get(name, opts);
    }
    return _ablyChannels[name];
  }

  _presenceEnter = async function(){
    if(!_ablyReady || !_currentUser || !_isPagePresent()) return;
    try{
      const payload = {
        name: _currentUser.name,
        color: _currentUser.color,
        ts: Date.now(),

      };

  _presenceLeave = async function(){
    if(!_ablyReady) return;
    try{ await _ablyChannel(ONLINE_PRESENCE_CHANNEL).presence.leave(); }catch(e){}
    if(_currentUser?.name) delete _presenceMembers[_currentUser.name];
    updateOnlineCount();
  }

  _syncPresenceFromVisibility = async function(){
    if(!_currentUser || !_ablyReady) return;
    if(_isPagePresent()) await _presenceEnter();
    else await _presenceLeave();
  }

  _onPresenceEvent = function(member){
    if(!member?.data?.name) return;
    const name = member.data.name;
    if(member.action === 'leave' || member.action === 'absent') delete _presenceMembers[name];
    else _presenceMembers[name] = member.data;
    updateOnlineCount();
  }

  ablyInit = async function(){
    return new Promise(resolve => {
      if(typeof Ably !== 'undefined'){ _setupAbly(resolve); return; }
      const s = document.createElement('script');
      s.src = 'https://cdn.ably.com/lib/ably.min-2.js';
      s.onload = () => _setupAbly(resolve);
      s.onerror = () => { console.warn('[Ably] script load failed'); resolve(); };
      document.head.appendChild(s);
    });
  }

  _setupAbly = function(resolve){
    try{
      if(_ably){
        try{ if(typeof _ably.close === 'function') _ably.close(); }catch(e){}
        try{ if(_ably.connection && typeof _ably.connection.close === 'function') _ably.connection.close(); }catch(e){}
      }
      _ablyReady = false;
      _ablyChannels = {};
      _ably = new Ably.Realtime({
        key: ABLY_KEY,
        clientId: 'anon-' + Math.random().toString(36).slice(2,8)
      });

      let resolved = false;
      const finish = () => {
        if(!resolved){ resolved = true; resolve(); }
      };

      _ably.connection.on('connected', async () => {
        _ablyReady = true;

        try{
          const kvCh = _ablyChannel('ecg:kv');
          kvCh.unsubscribe();
          kvCh.subscribe('set', msg => {
            const key = msg?.data?.key;
            const value = msg?.data?.value;
            if(!key) return;
            _kv[key] = value;
            if(key.startsWith('ecg_math_users:') && key !== 'ecg_math_users:index'){
              try{
                const profile = JSON.parse(value);
                if(profile?.name) __mergeProfile(profile, {persist:true});
              }catch(e){}
            }
          });
        }catch(e){}

        try{
          const chatCh = _ablyChannel(ONLINE_CHAT_CHANNEL);
          chatCh.unsubscribe();
          chatCh.subscribe('msg', msg => {
            const m = msg.data;
            if(!m || !m.ts || !m.author) return;
            const now = Date.now();
            const exists = _chatMsgs.some(x => x.ts === m.ts && x.author === m.author);
            if(exists) return;
            _chatMsgs.push(m);
            _chatMsgs = _chatMsgs.filter(x => (now - x.ts) < CHAT_TTL).slice(-CHAT_MAX);
            _chatMsgs.sort((a,b)=>a.ts-b.ts);
            if(_chatOpen){ chatRenderMessages(); _chatMarkRead(); }
            else if(m.author !== _currentUser?.name && m.ts > _chatLastSeen){
              _chatUnread++;
              _chatRefreshBadge();
            }
          });
          _chatHistoryLoaded = false;
          if(_chatOpen || _currentUser) _loadChatHistory();
        }catch(e){}

        try{
          const presenceCh = _ablyChannel(ONLINE_PRESENCE_CHANNEL);
          presenceCh.presence.unsubscribe();
          ['enter','update','leave','present','absent'].forEach(evt => presenceCh.presence.subscribe(evt, _onPresenceEvent));
          await __syncPresenceMembers();
        }catch(e){}

        try{
          const profileCh = _ablyChannel(ONLINE_PROFILES_CHANNEL);
          profileCh.unsubscribe();
          profileCh.subscribe('profile.upsert', msg => {
            if(msg?.data?.name) __mergeProfile(msg.data, {persist:true});
          });
          await __loadProfilesFromHistory(true);
        }catch(e){}

        try{
          const duelCh = _ablyChannel(ONLINE_DUELS_CHANNEL);
          duelCh.unsubscribe();
          duelCh.subscribe('invite', msg => {
            const data = msg.data || {};
            if(!_currentUser || data.to !== _currentUser.name) return;
            if(_duelState) return;
            if(!isUserOnline(data.from)) return;
            _showDuelNotifBanner(data.from, data.roomId);
          });
          duelCh.subscribe('accept', msg => {
            const data = msg.data || {};
            if(!_currentUser) return;
            if(_duelState?.phase === 'waiting' && data.roomId === _duelState.roomId && data.to === _currentUser.name){
              _startDuel(data.from, data.roomId, true);
            }
          });
          duelCh.subscribe('decline', msg => {
            const data = msg.data || {};
            if(!_currentUser) return;
            if(_duelState?.phase === 'waiting' && data.roomId === _duelState.roomId && data.to === _currentUser.name){
              _duelState = null;
              const c = document.getElementById('content');
              if(c) c.innerHTML = `<div class="content-inner"><div style="text-align:center;padding:44px 20px"><div style="font-size:28px;margin-bottom:10px">⚔️</div><div style="font-family:var(--ff-ser);font-size:22px;color:var(--t1);margin-bottom:8px">${data.from} a refusé le duel</div><button class="qnbtn" onclick="go('scoreboard')">Retour au scoreboard</button></div></div>`;
            }
          });
          duelCh.subscribe('cancel', msg => {
            const data = msg.data || {};
            if(!_currentUser) return;
            if(data.to === _currentUser.name) document.getElementById('duel-notif-banner')?.remove();
            if(_duelState?.phase === 'waiting' && data.roomId === _duelState.roomId && data.to === _currentUser.name){
              _duelState = null;
              go('scoreboard');
            }
          });
          duelCh.subscribe('result', msg => {
            const data = msg.data || {};
            if(!_currentUser || !_duelState || data.roomId !== _duelState.roomId) return;
            if(data.player === _currentUser.name) return;
            _onOpponentDuelResult(data);
          });
        }catch(e){}

        if(_currentUser){
          await _syncPresenceFromVisibility();
          await sbPushMyStats();
        }
        finish();
      });

      _ably.connection.on('disconnected', () => { _ablyReady = false; });
      _ably.connection.on('failed', () => { console.warn('[Ably] connection failed'); finish(); });
      _ably.connection.on('suspended', () => { _ablyReady = false; });
    }catch(e){
      console.warn('[Ably] setup error:', e);
      resolve();
    }
  }

  sbPushMyStats = async function(extra){
    extra = extra || {};
    if(!_currentUser || !_ablyReady || _sbPushInProgress) return;
    _sbPushInProgress = true;
    try{
      const current = _usersCache.find(u => u.name === _currentUser.name);
      const scores = {total: Math.round(mastPct(FICHES)*10)/10};
      Object.keys(DOMAINS).forEach(dk => {
        scores[dk] = Math.round(mastPct(FICHES.filter(f => f.domain === dk))*10)/10;
      });
      const prevLegacy = await storageGet(_currentUser.key, true).catch(()=>null);
      let legacyData = {};
      try{ if(prevLegacy?.value) legacyData = JSON.parse(prevLegacy.value); }catch(e){}
      const base = current || legacyData || {};
      const profile = {
        name: _currentUser.name,
        color: _currentUser.color,
        key: _currentUser.key,
        pwHash: _currentUser.pwHash || base.pwHash || '',
        scoreboardActive: true,
        online: _isPagePresent(),
        scores,
        streak: getStreak(),
        bestStreak: Math.max(_getStoredBestStreak(), base.bestStreak || 0, _sessionBestStreak || 0),
        mastered: mastCount(FICHES),
        totalFiches: FICHES.length,
        duelsWon: extra.duelsWon !== undefined ? extra.duelsWon : (base.duelsWon || 0),
        duelsPlayed: extra.duelsPlayed !== undefined ? extra.duelsPlayed : (base.duelsPlayed || 0),
        mastery: MASTERY,
        lastSeen: Date.now(),
        updatedAt: Date.now()
      };
      await __publishProfile(profile);
      _sbUserIndexed = true;
    }catch(e){
      console.warn('[online] sbPushMyStats error:', e);
    }finally{
      _sbPushInProgress = false;
    }
  }

  sbLogin = async function(name, password){
    name = __normName(name);
    password = password || '';
    if(!name) return false;
    let pwHash = '';
    if(password){
      pwHash = password.startsWith('__hash__') ? password.slice(8) : await _hashPassword(password);
    }

    await _fetchAllUsers(true);
    let existing = _usersCache.find(u => u.name.toLowerCase() === name.toLowerCase()) || null;
    if(!existing){
      try{
        const legacy = await storageGet(sbUserKey(name), true);
        if(legacy?.value){ existing = JSON.parse(legacy.value); }
      }catch(e){}
    }

    if(existing?.pwHash && pwHash !== existing.pwHash){
      _showLoginError('Mot de passe incorrect.');
      return false;
    }

    const color = existing?.color || USER_COLORS[Math.abs(name.split('').reduce((a,ch)=>a+ch.charCodeAt(0),0)) % USER_COLORS.length];
    _currentUser = {name, color, key: sbUserKey(name), pwHash: pwHash || existing?.pwHash || ''};
    localStorage.setItem('ecg_math_username', name);
    if(_currentUser.pwHash) localStorage.setItem('ecg_math_pwhash', _currentUser.pwHash);
    else localStorage.removeItem('ecg_math_pwhash');

    if(existing?.mastery){
      try{
        Object.keys(existing.mastery).forEach(fid => {
          const local = MASTERY[fid] || {pts:0};
          const cloud = existing.mastery[fid];
          if((cloud?.pts || 0) > (local?.pts || 0)) MASTERY[fid] = cloud;
        });
        saveMastery();
        updateUI();
      }catch(e){}
    }

    updateSbUI();
    document.getElementById('sb-login-modal')?.remove();
    if(_currentView === 'scoreboard') go('scoreboard');
    await _syncPresenceFromVisibility();
    await sbPushMyStats();
    sbStartHeartbeat();
    _loadChatHistory();
    chatRenderFooter();
    return true;
  }

  sbLogout = async function(){
    const prevUser = _currentUser ? Object.assign({}, _currentUser) : null;
    if(prevUser){
      await _presenceLeave();
      const existing = _usersCache.find(u => u.name === prevUser.name) || {};
      const hidden = Object.assign({}, existing, {
        name: prevUser.name,
        color: prevUser.color,
        key: prevUser.key,
        pwHash: existing.pwHash || prevUser.pwHash || '',
        scoreboardActive: false,
        online: false,
        lastSeen: Date.now(),
        updatedAt: Date.now()
      });
      try{ await _ablyChannel(ONLINE_PROFILES_CHANNEL).publish('profile.upsert', hidden); }catch(e){}
      try{ await storageSet(prevUser.key, JSON.stringify(hidden), true); }catch(e){}
      __saveProfileLocal(hidden);
      _usersCache = _usersCache.filter(u => u.name !== prevUser.name);
      _usersCacheTs = Date.now();
    }
    _currentUser = null;
    _duelState = null;
    localStorage.removeItem('ecg_math_username');
    localStorage.removeItem('ecg_math_pwhash');
    if(_onlineHeartbeat){ clearTimeout(_onlineHeartbeat); _onlineHeartbeat = null; }
    updateSbUI();
    chatRenderFooter();
    if(_currentView === 'scoreboard') go('scoreboard');
    updateOnlineCount();
  }

  initUser = async function(){
    if(_onlineReinitDone) return;
    _onlineReinitDone = true;
    try{ if(_onlineHeartbeat){ clearTimeout(_onlineHeartbeat); _onlineHeartbeat = null; } }catch(e){}
    _profilesHydrated = false;
