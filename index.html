<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Maths ECG 2A — Révision</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&amp;family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&amp;family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{
  --bg:#0e0d12;--s1:#13121a;--s2:#18171f;--s3:#201f29;--s4:#282633;
  --bd:#2a2836;--bd2:#332f45;
  --t1:#e8e4f0;--t2:#c4bdd8;--t3:#8a83a0;--t4:#5a546e;--t5:#3a3550;
  --fg:#e8e4f0;
  --navy:#4a7ab8;--navybg:rgba(74,122,184,.10);
  --gold:#c49a28;--gold2:#dab84c;--goldbg:rgba(218,184,76,.10);
  --green:#3a9a72;--greenbg:rgba(58,154,114,.10);
  --red:#d15248;--redbg:rgba(209,82,72,.10);
  --purple:#9068c8;--purplebg:rgba(144,104,200,.10);
  --orange:#d08040;--orangebg:rgba(208,128,64,.10);
  --r:8px;--r2:10px;
  --sh:0 4px 24px rgba(0,0,0,.4);
  --ease:cubic-bezier(.4,0,.2,1);
  --ff-mono:'DM Mono',monospace;
  --ff-sans:'DM Sans',sans-serif;
  --ff-ser:'Cormorant Garamond',serif;
  /* domain colors */
  --col-alg:#9068c8;--col-ana:#4a7ab8;--col-prob:#3a9a72;
  /* type colors */
  --col-def:#dab84c;--col-thm:#d15248;--col-meth:#4a7ab8;--col-prop:#3a9a72;--col-rem:#8a83a0;
}
[data-theme=light]{
  --bg:#f8f5ef;--s1:#fff;--s2:#f2ede4;--s3:#e8e0d0;--s4:#ddd5c0;
  --bd:#ddd5c4;--bd2:#ccc4b0;
  --t1:#1a1820;--t2:#3a3550;--t3:#6a6480;--t4:#9a94b0;--t5:#c4bed8;
  --fg:#1a1820;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-text-size-adjust:100%}
.katex-display{max-width:100%;overflow-x:auto;overflow-y:hidden;padding:2px 0}.formula,.pbody,.condition-item,.sbsr-title{overflow-wrap:anywhere}.sbsr-title .katex-display{margin:.25em 0}.sbsr-title .katex{font-size:1em}.pbody .katex,.condition-item .katex,.formula .katex,.fc-title .katex,.fc-summary .katex,.ptitle .katex{white-space:nowrap}.pbody .katex-display,.condition-item .katex-display,.formula .katex-display{white-space:normal;overflow-x:auto;overflow-y:hidden;padding:4px 0}.formula{line-height:1.7}
body{font-family:var(--ff-sans);background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
/* ── LAYOUT ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;height:100vh;overflow-y:auto;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;transition:transform .3s var(--ease)}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:48px;min-height:48px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--bd);background:var(--s1);gap:10px;z-index:10}
.content{flex:1;overflow-y:auto;padding:0;scroll-behavior:smooth}
.content-inner{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.content-inner{max-width:860px;margin:0 auto;padding:20px 16px 40px}
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;z-index:200;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{width:100%}
}
/* ── SIDEBAR ── */
.sb-logo{padding:16px 16px 12px;border-bottom:1px solid var(--bd)}
.sb-logo-top{font-family:var(--ff-ser);font-size:20px;color:var(--t1);line-height:1}
.sb-logo-sub{font-family:var(--ff-mono);font-size:9px;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.sb-search-container{padding:10px 12px;position:relative}
.sb-search{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:6px 28px 6px 10px;font-family:var(--ff-mono);font-size:11px;color:var(--t1);outline:none;transition:border-color .15s}
.sb-search:focus{border-color:var(--bd2)}
.sb-search-clear{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t4);cursor:pointer;font-size:12px;display:none}
.sb-search-results{position:absolute;top:calc(100% - 6px);left:12px;right:12px;background:var(--s1);border:1px solid var(--bd2);border-radius:6px;z-index:100;max-height:260px;overflow-y:auto;box-shadow:var(--sh)}
.sbsr-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .1s}
.sbsr-item:hover{background:var(--s2)}
.sbsr-item:last-child{border-bottom:none}
.sbsr-type{font-family:var(--ff-mono);font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;flex-shrink:0}
.sbsr-body{flex:1;min-width:0}
.sbsr-title{font-size:11px;font-weight:600;color:var(--t1);white-space:normal;overflow:visible;text-overflow:unset;line-height:1.45}
.sbsr-sub{font-family:var(--ff-mono);font-size:9px;color:var(--t4)}
.sbsr-empty{padding:12px;text-align:center;font-family:var(--ff-mono);font-size:10px;color:var(--t4)}
.sb-nav{flex:1;padding:6px 0}
.sb-section{padding:4px 0}
.sb-sec-label{font-family:var(--ff-mono);font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t5);padding:8px 16px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;border-radius:5px;margin:1px 6px;transition:all .15s var(--ease);border:none;background:none;width:calc(100% - 12px);text-align:left;font-family:var(--ff-sans);font-size:12.5px;color:var(--t3);position:relative}
.nav-item:hover{background:var(--s2);color:var(--t2);transform:translateX(2px)}
.nav-item.active{background:var(--s2);color:var(--t1);font-weight:500;border-right:2px solid var(--navy)}
.nav-item .nav-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nav-badge{font-family:var(--ff-mono);font-size:8px;padding:1px 5px;border-radius:3px;background:var(--s3);margin-left:auto}
.sb-footer{padding:10px 12px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px}
/* ── TOPBAR ── */
.tb-hamburger{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;display:none;padding:4px}
@media(max-width:640px){.tb-hamburger{display:block}}
.tb-title{font-family:var(--ff-mono);font-size:11px;color:var(--t3);flex:1}
.tp-online{display:flex;align-items:center;gap:5px;font-family:var(--ff-mono);font-size:9px;color:var(--t3);cursor:pointer;transition:color .15s;user-select:none}
.tp-online:hover{color:var(--t1)}
.tp-online:hover #tp-online-tooltip{display:block!important}
.tp-online-dot{width:7px;height:7px;border-radius:50%;background:#2ecc71;animation:pulse-online 2s ease-in-out infinite;flex-shrink:0;transition:background .3s,opacity .3s}
@keyframes pulse-online{0%,100%{opacity:1;box-shadow:0 0 4px rgba(46,204,113,.5)}50%{opacity:.7;box-shadow:0 0 8px rgba(46,204,113,.3)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.chat-toggle-btn{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:5px 8px;cursor:pointer;color:var(--t3);transition:all .12s;position:relative}
.chat-toggle-btn:hover{border-color:var(--bd2);color:var(--t2)}
.chat-toggle-btn.has-unread{border-color:var(--navy);color:var(--navy)}
.chat-badge{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-family:var(--ff-mono);font-size:8px;border-radius:8px;padding:1px 4px;min-width:14px;text-align:center;display:none;line-height:1.4;z-index:2;pointer-events:none}
.theme-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:4px;transition:color .12s}
.theme-btn:hover{color:var(--t1)}
.tp-ring{position:relative;cursor:pointer}
.tp-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:8px;font-weight:600;color:var(--navy)}
/* ── HOME ── */
.home-hero{background:linear-gradient(135deg,var(--s2) 0%,var(--s1) 100%);border:1px solid var(--bd);border-radius:var(--r2);padding:24px;margin-bottom:16px;display:flex;gap:20px;align-items:flex-start}
.hero-left{flex:1}
.hero-kick{font-family:var(--ff-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:6px}
.hero-h1{font-family:var(--ff-ser);font-size:30px;font-weight:600;color:var(--t1);line-height:1.1;margin-bottom:10px}
.hero-h1 em{color:var(--gold2);font-style:italic}
.hero-stats{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.hero-sn{font-family:var(--ff-mono);font-size:18px;font-weight:700;color:var(--t1);display:block}
.hero-sl{font-family:var(--ff-mono);font-size:9px;color:var(--t4)}
.hero-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:12px;font-weight:700;color:var(--gold2)}
.hero-ring-lbl{font-family:var(--ff-mono);font-size:9px;color:var(--t4);text-align:center;margin-top:4px}
.qa-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.qa-btn{font-family:var(--ff-mono);font-size:11px;padding:7px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--t3);cursor:pointer;transition:all .15s;white-space:nowrap}
.qa-btn:hover{background:var(--s3);color:var(--t1);border-color:var(--bd2)}
.qa-btn.qa-p{background:var(--navybg);border-color:rgba(74,122,184,.3);color:var(--navy);font-weight:500}
.qa-btn.qa-p:hover{background:var(--navy);color:#fff}
.qa-btn.qa-g{background:var(--goldbg);border-color:rgba(218,184,76,.3);color:var(--gold2)}
.home-section{margin-bottom:20px}
.home-sec-hdr{font-family:var(--ff-mono);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
/* domain cards */
.dom-grid{display:flex;flex-direction:column;gap:10px}
.dom-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;transition:all .2s var(--ease)}
.dom-card:hover{box-shadow:var(--sh);transform:translateY(-1px)}
.dom-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;cursor:pointer;gap:12px}
.dom-badge{font-family:var(--ff-mono);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px;border:1px solid;display:inline-block;margin-bottom:5px}
.dom-title{font-family:var(--ff-ser);font-size:15px;font-weight:600;color:var(--t2);line-height:1.25}
.dom-ring{position:relative;width:44px;height:44px;flex-shrink:0}
.dom-ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:8.5px;font-weight:700}
.dom-chapters{border-top:1px solid var(--bd2);padding:4px 0}
.dom-chapitre{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left}
.dom-chapitre:hover{background:var(--s2)}
.dom-ch-tag{font-family:var(--ff-mono);font-size:9px;color:var(--t4);background:var(--s2);padding:2px 6px;border-radius:3px;flex-shrink:0}
.dom-ch-name{font-size:12.5px;color:var(--t2);flex:1}
.dom-ch-n{font-family:var(--ff-mono);font-size:10px;color:var(--t4);flex-shrink:0}
.dom-ch-bar{width:60px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;flex-shrink:0}
.dom-ch-fill{height:100%;border-radius:2px;transition:width .8s var(--ease)}
.dom-ch-pct{font-family:var(--ff-mono);font-size:10px;font-weight:600;min-width:30px;text-align:right;flex-shrink:0}
.dom-ch-actions{display:flex;gap:3px;flex-shrink:0}
.dom-act-btn{background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:4px 7px;font-size:10px;cursor:pointer;color:var(--t3);transition:all .12s;line-height:1}
.dom-act-btn:hover{background:var(--s3);color:var(--t1)}
.dom-act-quiz{background:var(--navybg);border-color:rgba(74,122,184,.25);color:var(--navy)}
.dom-act-quiz:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
/* due section */
.due-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.due-card{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:10px;cursor:pointer;transition:all .15s}
.due-card:hover{border-color:var(--bd2);background:var(--s3)}
.due-card.overdue{border-color:rgba(209,82,72,.25);background:var(--redbg)}
.due-card-type{font-family:var(--ff-mono);font-size:8px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:1px}
.due-card-title{font-size:11.5px;font-weight:600;color:var(--t1);margin-top:3px;line-height:1.3}
.due-card-sr{font-family:var(--ff-mono);font-size:9px;color:var(--t4);margin-top:5px}
.due-badge{font-family:var(--ff-mono);font-size:9px;padding:2px 7px;border-radius:10px;background:var(--goldbg);color:var(--gold2);border:1px solid rgba(218,184,76,.2)}
.due-badge.urgent{background:var(--redbg);color:var(--red);border-color:rgba(209,82,72,.2)}
/* chart */
.chart-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;overflow:hidden}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.chart-ttl{font-family:var(--ff-mono);font-size:10px;font-weight:600;color:var(--t3)}
.chart-tabs{display:flex;gap:4px}
.chart-tab{background:var(--s2);border:1px solid var(--bd);border-radius:4px;padding:2px 8px;font-family:var(--ff-mono);font-size:9px;cursor:pointer;color:var(--t4);transition:all .12s}
.chart-tab.active{background:var(--navy);border-color:var(--navy);color:#fff}
/* ── FICHES LIST ── */
.ph{display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;padding:18px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2)}
.ph-l{flex:1}
.ph-eye{font-family:var(--ff-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:4px}
.ph-title{font-family:var(--ff-ser);font-size:22px;font-weight:600;color:var(--t1);line-height:1.2}
.ph-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.ph-mi{font-family:var(--ff-mono);font-size:10px;color:var(--t4)}
.ph-mi strong{color:var(--t2)}
.ph-ring{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.ring-w{position:relative;width:64px;height:64px}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:10px;font-weight:700;color:var(--navy)}
.ring-lbl{font-family:var(--ff-mono);font-size:8px;color:var(--t4)}
.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);position:sticky;top:0;z-index:9}
.fchip{font-family:var(--ff-mono);font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid var(--bd);background:var(--s2);color:var(--t3);cursor:pointer;transition:all .12s;white-space:nowrap}
.fchip:hover{border-color:var(--bd2);color:var(--t2)}
.fchip.active{background:var(--navy);border-color:var(--navy);color:#fff}
.toolbar-sep{flex:1}
.search-box{display:flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:4px 8px}
.search-icon{color:var(--t4);font-size:13px}
.search-box input{background:none;border:none;outline:none;font-family:var(--ff-mono);font-size:10px;color:var(--t1);width:120px}
.search-box input::placeholder{color:var(--t5)}
.count-tag{font-family:var(--ff-mono);font-size:9px;color:var(--t4);white-space:nowrap}
/* fiches grid */
.fiches-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.fiche-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:13px;cursor:pointer;transition:all .18s var(--ease);position:relative;overflow:hidden}
.fiche-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.fiche-card:hover{box-shadow:var(--sh);border-color:var(--bd2);transform:translateY(-2px)}
.fiche-card.mastered{border-color:rgba(58,154,114,.25)}
.fiche-card .fc-type{font-family:var(--ff-mono);font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.fiche-card .fc-title{font-size:14px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:5px}
.fiche-card .fc-summary{font-size:12px;color:var(--t3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.fiche-card .fc-footer{display:flex;align-items:center;gap:6px;margin-top:8px}
.fiche-pts{font-family:var(--ff-mono);font-size:10px;font-weight:600;margin-left:auto}
.fiche-bar{height:2px;background:var(--s3);border-radius:1px;margin-top:8px;overflow:hidden}
.fiche-fill{height:100%;border-radius:1px;transition:width .6s var(--ease)}
/* type badges */
.badge-def{background:rgba(218,184,76,.12);color:var(--gold2);border:1px solid rgba(218,184,76,.2)}
.badge-thm{background:var(--redbg);color:var(--red);border:1px solid rgba(209,82,72,.2)}
.badge-meth{background:var(--navybg);color:var(--navy);border:1px solid rgba(74,122,184,.2)}
.badge-prop{background:var(--greenbg);color:var(--green);border:1px solid rgba(58,154,114,.2)}
.badge-rem{background:var(--s2);color:var(--t3);border:1px solid var(--bd)}
/* ── QUIZ ── */
.qwrap{padding-bottom:40px}
.qhdr{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;margin-bottom:14px}
.qhdr-title{font-family:var(--ff-ser);font-size:20px;font-weight:600;color:var(--t1);margin-bottom:4px}
.qhdr-sub{font-family:var(--ff-mono);font-size:9px;color:var(--t4)}
.qcfg{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.qcfg-label{font-family:var(--ff-mono);font-size:8px;color:var(--t5);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;margin-right:2px}
.qcbtn{font-family:var(--ff-mono);font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid var(--bd);background:var(--s2);color:var(--t4);cursor:pointer;transition:all .12s}
.qcbtn:hover{border-color:var(--bd2);color:var(--t2)}
.qcbtn.active{background:var(--navybg);border-color:rgba(74,122,184,.3);color:var(--navy)}
.qcat-chip{font-family:var(--ff-mono);font-size:9px;padding:3px 9px;border-radius:4px;border:1px solid var(--bd);background:var(--s2);color:var(--t4);cursor:pointer;transition:all .12s}
.qcat-chip.active{color:#fff}
.qcat-pip{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.qcat-count{font-size:8px;opacity:.7;margin-left:3px}
.qchip-due{background:var(--goldbg);border:1px solid rgba(218,184,76,.2);color:var(--gold2);font-family:var(--ff-mono);font-size:9px;padding:3px 8px;border-radius:4px;cursor:pointer}
.qnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ql{font-family:var(--ff-mono);font-size:10px;color:var(--t4);display:flex;gap:10px}
.ql span strong{color:var(--t2)}
.qpf-wrap{flex:1;height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin:0 10px}
.qpf{height:100%;background:var(--navy);border-radius:2px;transition:width .3s var(--ease)}
.qpd-wrap{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:10px}
.qpd{width:8px;height:8px;border-radius:2px;background:var(--s3);flex-shrink:0;transition:background .2s}
.qpd.ok{background:var(--green)}
.qpd.ko{background:var(--red)}
.qpd.cur{background:var(--navy);box-shadow:0 0 4px rgba(74,122,184,.5)}
.qcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:18px;margin-bottom:10px;transition:opacity .2s ease,transform .2s ease}
.qstripe{height:2px;border-radius:1px;margin-bottom:12px}
.qmode-label{font-family:var(--ff-mono);font-size:9px;color:var(--t4);margin-bottom:8px}
.qquestion{font-family:var(--ff-ser);font-size:19px;font-weight:600;color:var(--t1);line-height:1.35;margin-bottom:8px}
.qcontext{display:none;margin-bottom:10px;padding:8px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--s2);font-size:12px;color:var(--t2);line-height:1.6}
.qvisual{display:none;margin-bottom:12px;padding:10px;border:1px solid var(--bd);border-radius:8px;background:var(--s2)}
.qvisual svg{display:block;width:100%;height:auto;max-width:420px;margin:0 auto}
.qvisual .katex-display{margin:.3rem 0}
.qhint{font-family:var(--ff-mono);font-size:10px;color:var(--t3);line-height:1.6}
.hint-btn{font-family:var(--ff-mono);font-size:10px;padding:4px 10px;border-radius:4px;border:1px solid var(--bd);background:var(--s2);color:var(--t3);cursor:pointer;transition:all .12s}
.hint-btn:hover{background:var(--goldbg);border-color:rgba(218,184,76,.3);color:var(--gold2)}
.hint-content{margin-top:6px;padding:8px 12px;background:var(--goldbg);border:1px solid rgba(218,184,76,.15);border-radius:5px;font-size:12px;color:var(--t2);line-height:1.6}
.quiz-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.qopt{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:11px 14px;text-align:left;color:var(--t2);cursor:pointer;transition:all .12s;font-size:13px;font-family:var(--ff-sans);position:relative;line-height:1.55}
.qopt:hover:not(:disabled){background:var(--s3);border-color:var(--bd2);color:var(--t1);transform:translateX(3px)}
.qopt:disabled{cursor:default}
.qopt.correct{background:var(--greenbg);border-color:rgba(58,154,114,.35);color:var(--green);animation:optCorrect .3s ease}
@keyframes optCorrect{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.qopt.wrong{background:var(--redbg);border-color:rgba(209,82,72,.35);color:var(--red);animation:optWrong .3s ease}
@keyframes optWrong{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
.qopt.dimmed{opacity:.4}
.qopt::before{content:attr(data-idx);font-family:var(--ff-mono);font-size:8px;color:var(--t5);position:absolute;top:4px;right:8px}

.qreview-block{margin-top:12px;padding-top:10px;border-top:1px solid var(--bd)}
.qreview-title{font-family:var(--ff-mono);font-size:8px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--t4);margin-bottom:8px}
.qreview-list{display:flex;flex-direction:column;gap:6px}
.qreview-item{display:flex;align-items:flex-start;gap:10px;padding:10px 11px;border:1px solid var(--bd);border-radius:8px;background:var(--s1)}
.qreview-item.correct{background:var(--greenbg);border-color:rgba(58,154,114,.26)}
.qreview-item.selectedWrong{background:var(--redbg);border-color:rgba(209,82,72,.28)}
.qreview-item.selected{box-shadow:0 0 0 1px rgba(74,122,184,.15) inset}
.qreview-letter{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--ff-mono);font-size:10px;font-weight:700;background:var(--s3);color:var(--t2);margin-top:1px}
.qreview-item.correct .qreview-letter{background:var(--green);color:#fff}
.qreview-item.selectedWrong .qreview-letter{background:var(--red);color:#fff}
.qreview-body{flex:1;min-width:0}
.qreview-answer{font-size:13px;color:var(--t1);line-height:1.6}
.qreview-rationale{font-size:12px;color:var(--t3);line-height:1.6;margin-top:4px}
.qreview-badge{font-family:var(--ff-mono);font-size:8px;letter-spacing:.6px;text-transform:uppercase;padding:2px 6px;border-radius:999px;border:1px solid var(--bd);background:var(--s2);color:var(--t4);flex-shrink:0;margin-left:6px}
.qreview-item.correct .qreview-badge{background:var(--greenbg);border-color:rgba(58,154,114,.24);color:var(--green)}
.qreview-item.selectedWrong .qreview-badge{background:var(--redbg);border-color:rgba(209,82,72,.24);color:var(--red)}

.qfb{background:var(--s2);border:1px solid var(--bd);border-left:3px solid var(--green);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;display:none}
.qfv{font-family:var(--ff-mono);font-size:11px;font-weight:700;margin-bottom:6px}
.qfau{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:3px}
.qfco{font-size:12.5px;color:var(--t3);margin-bottom:8px;font-style:italic}
.qfbd{font-size:13px;color:var(--t3);line-height:1.6}
.plink{font-family:var(--ff-mono);font-size:10px;color:var(--navy);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline}
.qnbtn{font-family:var(--ff-mono);font-size:10px;padding:6px 14px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t3);cursor:pointer;transition:all .12s;white-space:nowrap}
.qnbtn:hover{background:var(--s3);color:var(--t1)}
.qnbtn.qng{background:var(--navybg);border-color:rgba(74,122,184,.3);color:var(--navy)}
.qnbtn.qng:hover{background:var(--navy);color:#fff}
.qnbtn.qnw{background:var(--redbg);border-color:rgba(209,82,72,.2);color:var(--red)}
.qnext{display:flex;gap:8px;margin-top:10px}
/* final */
.qfinal{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:24px;text-align:center}
.qfl{font-family:var(--ff-mono);font-size:9px;color:var(--t4);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.qfs{font-family:var(--ff-ser);font-size:52px;font-weight:600;line-height:1}
.qfs .sl{font-size:22px;opacity:.5}
.qfmsg{font-family:var(--ff-mono);font-size:11px;color:var(--t3);margin-top:8px;line-height:1.6}
.qfacts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
/* ritem */
.ritem{display:grid;grid-template-columns:56px 12px 1fr;gap:0 8px;align-items:center;padding:8px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);margin-bottom:6px;transition:border-color .12s}
.ritem:hover{border-color:var(--bd2)}
.ri-p{text-align:right}
.ri-dot{width:8px;height:8px;border-radius:50%;margin:0 auto}
.ri-au{font-size:12px;font-weight:600;color:var(--t1)}
.ri-co{font-size:10px;color:var(--t3);margin-top:2px}
/* ── PANEL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:149;opacity:0;pointer-events:none;transition:opacity .3s var(--ease)}
.overlay.open{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;bottom:0;width:min(580px,100vw);background:var(--s1);border-left:1px solid var(--bd);z-index:150;overflow-y:auto;transform:translateX(100%);transition:transform .35s var(--ease);padding:24px;scroll-behavior:smooth}
.panel.open{transform:translateX(0)}
.pcls{position:sticky;top:0;float:right;background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:5px 9px;cursor:pointer;color:var(--t3);font-size:12px;z-index:2;margin-bottom:8px}
.pcls:hover{color:var(--t1)}
.pcat{font-family:var(--ff-mono);font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.ptitle{font-family:var(--ff-ser);font-size:26px;font-weight:600;color:var(--t1);line-height:1.2;margin-bottom:10px}
.pbody{font-size:14px;color:var(--t2);line-height:1.7}
.pbody strong{color:var(--t1);font-weight:600}
.pbody em{color:var(--gold2);font-style:italic}
.pbody sub,.pbody sup{font-size:0.75em}
.pbody .formula{background:var(--s2);border:1px solid var(--bd);border-left:3px solid var(--navy);border-radius:5px;padding:14px 18px;font-family:var(--ff-mono);font-size:14px;color:var(--navy);margin:10px 0;overflow-x:auto;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.pbody .warning{background:var(--redbg);border:1px solid rgba(209,82,72,.25);border-left:3px solid var(--red);border-radius:5px;padding:12px 16px;font-size:13.5px;color:var(--red);margin:10px 0;line-height:1.6}
.pbody .conditions{background:var(--goldbg);border:1px solid rgba(218,184,76,.25);border-left:3px solid var(--gold2);border-radius:5px;padding:10px 13px;margin:10px 0}
.pbody .conditions-title{font-family:var(--ff-mono);font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold2);margin-bottom:7px}
.pbody .condition-item{font-size:13.5px;color:var(--t2);margin-bottom:6px;padding-left:16px;position:relative;line-height:1.65}
.pbody .condition-item::before{content:'✓';position:absolute;left:0;color:var(--gold2);font-size:9px;top:2px}
.pbody .method-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.pbody p{font-size:14px;color:var(--t2);line-height:1.7;margin:6px 0}
.pbody strong{color:var(--t1);font-weight:600}
.pbody em{color:var(--gold2);font-style:italic}
.pbody sub,.pbody sup{font-size:0.75em}
.pbody .step-num{font-family:var(--ff-mono);font-size:9px;font-weight:700;color:var(--navy);background:var(--navybg);padding:2px 6px;border-radius:3px;flex-shrink:0;margin-top:1px}
.pbody .step-text{font-size:13.5px;color:var(--t2);line-height:1.6}

/* ── KATEX — intégration thème sombre ── */
.katex{font-size:1.18em}
.katex-display{margin:16px 0;overflow-x:auto;overflow-y:hidden}
.katex-display > .katex{padding:0 4px}
/* Couleur du texte KaTeX selon le contexte */
.pbody .katex{color:var(--t1)}
.pbody .formula .katex{color:var(--navy)}
.pbody .warning .katex{color:var(--red)}
.pbody .conditions .katex,.pbody .condition-item .katex{color:var(--t1)}
/* Quiz : question et options */
#qquestion .katex{color:var(--t1);font-size:1.1em}
.qopt .katex{color:inherit;font-size:1.1em}.qopt .katex-display{margin:.2rem 0;overflow-x:auto}
.qfb .katex{color:inherit;font-size:1.1em}
/* Fiches cards */
.fc-summary .katex{font-size:0.95em}
/* Formules display bien encadrées */
.pbody .formula .katex-display{background:transparent;margin:6px 0}
.pbody .formula .katex-display>.katex{font-size:1.35em}
/* Conditions clés DS dans le panel */
[style*="font-size:11.5px"] .katex{font-size:1.12em}
.panel-mastery{margin-top:14px;padding:12px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r)}
.pm-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:8px}
.pm-fill{height:100%;border-radius:3px;transition:width .6s var(--ease)}
.pnav{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.pnav button{font-family:var(--ff-mono);font-size:9px;padding:4px 9px;border-radius:4px;border:1px solid var(--bd);background:var(--s2);color:var(--t3);cursor:pointer;transition:all .12s}
.pnav button:hover{color:var(--t1);border-color:var(--bd2)}
/* prel */
.prel-list{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.prel-item{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;transition:background .12s}
.prel-item:hover{background:var(--s2)}
.prel-badge{flex-shrink:0;font-family:var(--ff-mono);font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 5px;border-radius:3px;margin-top:2px;white-space:nowrap}
.prel-info{min-width:0;flex:1}
.prel-author{font-size:11.5px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.prel-sub{font-family:var(--ff-mono);font-size:9px;color:var(--t4)}
.prel-reason{font-size:9px;color:var(--t3);font-style:normal;margin-top:3px;display:block;max-height:0;opacity:0;overflow:hidden;transition:max-height .28s,opacity .22s;line-height:1.55}
.prel-item:hover .prel-reason{max-height:100px;opacity:1}
.prel-pts{font-family:var(--ff-mono);font-size:9px;flex-shrink:0;margin-left:4px;padding-top:2px}
/* ── PROGRESSION ── */
.prog-section{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:14px}
.prog-sec-title{font-family:var(--ff-mono);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin-bottom:12px}
.prog-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .12s;margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:4px}
.prog-row:hover{background:var(--s2)}
.prog-row:last-child{border-bottom:none}
.prog-label{flex:1;font-size:12px;color:var(--t2);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-bar{width:100px;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;flex-shrink:0}
.prog-fill{height:100%;border-radius:3px;transition:width .8s var(--ease)}
.prog-pct{font-family:var(--ff-mono);font-size:10px;font-weight:600;min-width:36px;text-align:right;flex-shrink:0}
/* radar */
.radar-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:14px}
.radar-svg-wrap{display:flex;justify-content:center}
.radar-svg-wrap svg{max-width:320px;width:100%}
.radar-leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;justify-content:center}
.radar-leg-item{display:flex;align-items:center;gap:5px;font-family:var(--ff-mono);font-size:9px;color:var(--t3)}
.radar-leg-dot{width:7px;height:7px;border-radius:50%}
/* streak */
.streak-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:14px;display:flex;gap:16px;align-items:center}
.streak-icon{font-size:32px}
.streak-info{flex:1}
.streak-n{font-family:var(--ff-ser);font-size:28px;font-weight:600;color:var(--gold2)}
.streak-label{font-family:var(--ff-mono);font-size:9px;color:var(--t4);margin-top:2px}
.streak-cal{display:flex;gap:3px;margin-top:10px;flex-wrap:wrap}
.streak-day{width:16px;height:16px;border-radius:3px;background:var(--s3);flex-shrink:0;transition:background .2s}
.streak-day.done{background:var(--green)}
.streak-day.today{outline:2px solid var(--gold2);outline-offset:1px}
/* ── CHAT ── */
.chat-panel{position:fixed;bottom:0;right:0;width:320px;height:420px;background:var(--s1);border:1px solid var(--bd);border-radius:10px 10px 0 0;z-index:160;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s var(--ease);box-shadow:var(--sh)}
.chat-panel.open{transform:translateY(0)}
.chat-header{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bd);gap:8px}
.chat-header-title{font-family:var(--ff-ser);font-size:14px;font-weight:600;color:var(--t1);flex:1}
.chat-online-pill{font-family:var(--ff-mono);font-size:9px;color:#2ecc71}
.chat-header-close{background:none;border:none;color:var(--t4);cursor:pointer;font-size:14px;padding:2px 6px}
.chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:2px}
.chat-empty{font-family:var(--ff-mono);font-size:10px;color:var(--t4);text-align:center;padding:20px;line-height:2}
.chat-msg{display:flex;flex-direction:column;align-items:flex-start;max-width:85%}
.chat-msg.me{align-self:flex-end;align-items:flex-end}
.chat-msg-header{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.chat-msg-avatar{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:7px;font-weight:700;color:#fff;flex-shrink:0}
.chat-msg-name{font-family:var(--ff-mono);font-size:9px;font-weight:600;color:var(--t3)}
.chat-msg-time{font-family:var(--ff-mono);font-size:8px;color:var(--t5)}
.chat-bubble{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:6px 10px;font-size:11.5px;color:var(--t2);line-height:1.5;max-width:100%;word-break:break-word}
.chat-msg.me .chat-bubble{background:var(--navybg);border-color:rgba(74,122,184,.2);color:var(--t1)}
.chat-footer{padding:8px;border-top:1px solid var(--bd)}
.chat-input-row{display:flex;gap:6px;align-items:flex-end}
.chat-input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-family:var(--ff-sans);font-size:12px;color:var(--t1);outline:none;resize:none;min-height:32px;max-height:80px;overflow-y:auto;transition:border-color .15s;line-height:1.5}
.chat-input:focus{border-color:var(--bd2)}
.chat-input::placeholder{color:var(--t5)}
.chat-send{background:var(--navy);border:none;border-radius:6px;width:32px;height:32px;color:#fff;cursor:pointer;font-size:13px;flex-shrink:0;transition:background .12s}
.chat-send:hover{background:#5a8ac8}
.chat-send:disabled{opacity:.5;cursor:default}
.chat-login-hint{font-family:var(--ff-mono);font-size:10px;color:var(--t4);text-align:center;padding:10px;line-height:2}
/* ── SCOREBOARD ── */
.sb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);border:1px solid var(--bd);background:var(--s2);margin-bottom:5px;cursor:pointer;transition:all .15s}
.sb-row:hover{border-color:var(--bd2)}
.sb-rank{font-family:var(--ff-mono);font-size:11px;font-weight:700;min-width:24px;text-align:center;flex-shrink:0}
.sb-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:12.5px;font-weight:600;color:var(--t1)}
.sb-title-badge{font-family:var(--ff-mono);font-size:8px;padding:1px 6px;border-radius:3px;margin-left:6px}
.sb-streak{font-family:var(--ff-mono);font-size:9px;color:var(--t4);margin-top:1px}
.sb-score{font-family:var(--ff-mono);font-size:14px;font-weight:700;flex-shrink:0}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* daily challenge */
.dq-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;margin-bottom:16px}
.dq-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dq-icon{font-size:22px}
.dq-title{font-family:var(--ff-ser);font-size:18px;font-weight:600;color:var(--t1)}
.dq-subtitle{font-family:var(--ff-mono);font-size:9px;color:var(--t4);margin-top:2px}
.dq-done-badge{font-family:var(--ff-mono);font-size:9px;padding:2px 8px;border-radius:8px;background:var(--greenbg);color:var(--green);border:1px solid rgba(58,154,114,.2);margin-left:auto}
/* duel notif */
.duel-notif-banner{position:fixed;bottom:80px;right:16px;background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r2);padding:14px 16px;z-index:300;box-shadow:var(--sh);max-width:280px;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.duel-notif-title{font-family:var(--ff-mono);font-size:10px;font-weight:700;color:var(--gold2);margin-bottom:4px}
.duel-notif-sub{font-size:12px;color:var(--t2);margin-bottom:10px}
.duel-notif-btns{display:flex;gap:6px}
/* notes/react */
.react-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px}
.react-btn{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:100px;border:1px solid var(--bd);background:var(--s2);cursor:pointer;transition:all .12s;font-size:12px}
.react-btn:hover{border-color:var(--gold2);background:var(--goldbg)}
.react-btn.mine{border-color:var(--navy);background:var(--navybg)}
.react-count{font-family:var(--ff-mono);font-size:10px;color:var(--t3)}
.react-notes{display:flex;flex-direction:column;gap:5px;margin-top:8px;max-height:180px;overflow-y:auto}
.react-note-item{display:flex;gap:8px;padding:6px 10px;background:var(--s2);border-radius:6px;border:1px solid var(--bd)}
.react-note-author{font-family:var(--ff-mono);font-size:9px;color:var(--gold2);flex-shrink:0;padding-top:1px}
.react-note-text{font-size:11px;color:var(--t2);line-height:1.5;flex:1}
.react-note-add{display:flex;gap:6px;margin-top:8px}
.react-note-input{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;color:var(--t1);font-family:var(--ff-sans);font-size:12px;outline:none;transition:border-color .15s}
.react-note-input:focus{border-color:var(--gold2)}
.react-note-input::placeholder{color:var(--t4)}
/* timer */

/* section separators in panel */
.psep{border:none;border-top:1px solid var(--bd);margin:14px 0}
.psec-title{font-family:var(--ff-mono);font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t5);margin-bottom:8px}

/* === v22 math display + visuals fixes === */
.katex{max-width:100%}
.katex-display{display:block;max-width:100%;overflow-x:auto;overflow-y:hidden;padding:.35rem 0;margin:.6rem 0}
.katex-display > .katex{max-width:none}
.pbody .formula,.pbody .example-block,.home-hero,.home-section,.fiche-card,.search-results,.search-dd,.search-panel,#panel-body{overflow-wrap:anywhere}
#panel-body .katex-display, #content .katex-display, .search-results .katex-display {background:transparent}
#panel-body .katex, #content .katex {font-size:1em}
.search-results .katex, .search-dd .katex, .fiche-card .katex {font-size:.96em}
.visual-block{margin-top:14px;padding:12px;border:1px solid var(--bd2);border-radius:10px;background:var(--s2)}
.visual-title{font-family:var(--ff-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:8px}
.visual-caption{font-size:12.5px;color:var(--t3);line-height:1.5;margin-top:8px}
.math-table-wrap{overflow-x:auto}
.variation-table{border-collapse:collapse;width:100%;min-width:460px;font-size:13px}
.variation-table td,.variation-table th{border:1px solid var(--bd2);padding:8px 10px;text-align:center;vertical-align:middle}
.variation-table th{background:var(--s3);color:var(--t1);font-weight:700}
.variation-arrow{font-size:20px;line-height:1}
.markov-svg{width:100%;max-width:640px;height:auto;display:block;margin:6px auto}
.step-svg{width:100%;max-width:560px;height:auto;display:block;margin:6px auto}






/* v25 chapter filter themed dropdown */
.qfilter-wrap{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px}
.qchapter-wrap{position:relative;display:inline-flex;align-items:center}
.qchapter-btn{
  font-family:var(--ff-mono);font-size:9px;padding:4px 11px;border-radius:4px;border:1px solid var(--bd);
  background:var(--s2);color:var(--t4);cursor:pointer;transition:all .12s;display:inline-flex;align-items:center;gap:7px;
  min-width:170px;justify-content:space-between
}
.qchapter-btn:hover{border-color:var(--bd2);color:var(--t2)}
.qchapter-btn.active{background:var(--goldbg);border-color:rgba(218,184,76,.28);color:var(--gold2)}
.qchapter-caret{font-size:10px;opacity:.9}
.qchapter-menu{
  position:absolute;top:calc(100% + 6px);left:0;z-index:30;min-width:260px;max-width:320px;max-height:260px;overflow:auto;
  background:var(--s1);border:1px solid var(--bd2);border-radius:8px;box-shadow:var(--sh);padding:6px;display:none
}
.qchapter-menu.open{display:block}
.qchapter-item{
  width:100%;text-align:left;font-family:var(--ff-mono);font-size:9px;padding:7px 9px;border-radius:6px;border:1px solid transparent;
  background:transparent;color:var(--t2);cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:space-between;gap:10px
}
.qchapter-item:hover{background:var(--s2);border-color:var(--bd)}
.qchapter-item.active{background:var(--navybg);border-color:rgba(74,122,184,.24);color:var(--navy)}
.qchapter-count{font-size:8px;color:var(--t4)}


/* v27 fixes: selected chapter visibility + mini quiz reset */
.qchapter-btn.active{
  background:linear-gradient(180deg,var(--navybg),rgba(74,122,184,.18));
  border-color:rgba(74,122,184,.45);
  color:var(--navy);
  box-shadow:0 0 0 1px rgba(74,122,184,.12) inset;
}
.qchapter-item.active{
  background:linear-gradient(180deg,var(--navybg),rgba(74,122,184,.16));
  border-color:rgba(74,122,184,.30);
  color:var(--navy);
  font-weight:700;
}
.qchapter-item.active .qchapter-count{color:var(--navy)}
.qchapter-check{
  display:inline-flex;align-items:center;justify-content:center;
  width:14px;height:14px;border-radius:50%;
  border:1px solid currentColor;font-size:9px;line-height:1;opacity:.95
}
.qchapter-item:not(.active) .qchapter-check{visibility:hidden}


/* v31 quiz question counters */
.qcount-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  border-radius:999px;
  border:1px solid var(--bd2);
  background:var(--s2);
  font-family:var(--ff-mono);
  font-size:10px;
  letter-spacing:.3px;
  color:var(--t2);
  margin-left:10px
}
.qcount-strong{color:var(--gold2);font-weight:700}


.katex-display{overflow-x:auto;padding:6px 0}
.qquestion .katex,.qopt .katex{font-size:1.18em}
.qopt{line-height:1.7}
pre,code,.qvisual pre,.pbody pre,.example-block pre{overflow-wrap:normal!important;word-break:normal!important;hyphens:none!important}

</style>
</head>

function hashString(str){
  let h=2166136261;
  const s=String(str||'');
  for(let i=0;i<s.length;i++){
    h^=s.charCodeAt(i);
    h=Math.imul(h,16777619);
  }
  return (h>>>0).toString(36);
}
function getQuizKey(f,q){
  const base=[f&&f.id||'', q&&q.id||'', q&&q.q||q&&q.prompt||q&&q.question||'', q&&q.correct||'', q&&q.context||'', q&&q.visual||''].join('||');

function getQuizState(f,q){

}
function recordQuizAnswer(f,q,ok){

    s.streak=(s.streak||0)+1;

    s.cooldown=0;
  }
  saveQuizSrs();
}
function daysSinceIso(iso){
  if(!iso) return 9999;
  const ts=Date.parse(iso);
  if(!Number.isFinite(ts)) return 9999;
  return Math.floor((Date.now()-ts)/(1000*60*60*24));
}
function isQuizDue(f,q){
  const s=getQuizState(f,q);
  if(!s.attempts) return true;
  if(s.lastResult===false) return true;
  return daysSinceIso(s.lastSeen)>=Math.max(1,s.cooldown||1);
}
function getQuizWeight(f,q){
  const s=getQuizState(f,q);
  let weight=getWeight(f);
  if(!s.attempts) weight*=1.35;
  if(s.lastResult===false) weight*=2.4;
  if((s.streak||0)>=2) weight*=0.58;
  if((s.streak||0)>=4) weight*=0.42;
  if((s.streak||0)>=6) weight*=0.28;
  if((s.cooldown||0)>=5) weight*=0.72;
  if((s.cooldown||0)>=8) weight*=0.62;
  if(isQuizDue(f,q)) weight*=1.18;
  return Math.max(0.05, Math.min(weight, 12));
}
function weightedPickIndex(items){
  const total=items.reduce((acc,it)=>acc+Math.max(0.05,Number(it.weight)||1),0);
  let r=Math.random()*total;
  for(let i=0;i<items.length;i++){
    r-=Math.max(0.05,Number(items[i].weight)||1);
    if(r<=0) return i;
  }
  return items.length-1;
}
function weightedSampleWithoutReplacement(items,n){
  const pool=items.slice();
  const out=[];
  while(pool.length && out.length<n){
    const idx=weightedPickIndex(pool);
    out.push(pool[idx]);
    pool.splice(idx,1);
  }
  return out;
}

function getMastery(f){
  if(!MASTERY[f.id]) MASTERY[f.id]={pts:0,attempts:0,streak:0,lastDate:null,interval:1,ef:2.5};
  return MASTERY[f.id];
}
function getPoints(f){ return getMastery(f).pts; }
function isMastered(f){ return getPoints(f)>=100; }
function isWeak(f){ const m=getMastery(f); return m.attempts>0&&m.pts<30; }

function recordAnswer(f,ok){
  const m=getMastery(f);
  m.attempts++;
  const today=new Date().toISOString().slice(0,10);
  if(ok){
    m.streak=(m.streak||0)+1;
    // Progressive gains: need multiple correct answers to master
    // First correct: +15, then +12, +10... Caps at 90, need at least 3 correct to reach 100
    const gain=Math.max(8, Math.min(15, 20 - m.streak*2));
    m.pts=Math.min(100, m.pts+gain);
    // Spaced repetition: increase interval based on streak
    m.ef=Math.max(1.3,(m.ef||2.5)+0.1);
    m.interval=Math.min(30, Math.round((m.interval||1)*(m.ef||2.5)));
    _lastAnswerInfo={gain,penalty:0,streak:m.streak,interval:m.interval};
  } else {
    const prevStreak=m.streak||0;
    m.streak=0;
    const penalty=Math.min(15, 8+prevStreak*2);
    m.pts=Math.max(0,m.pts-penalty);
    m.ef=Math.max(1.3,(m.ef||2.5)-0.2);
    m.interval=1;
    _lastAnswerInfo={gain:0,penalty,streak:0,interval:1};
  }
  m.lastDate=today;
  if(!DAILY_LOG[today]) DAILY_LOG[today]=0;
  DAILY_LOG[today]++;
  saveMastery(); saveDailyLog();
  // history
  try{
    const hist=JSON.parse(localStorage.getItem(HIST_KEY)||'[]');
    hist.push({date:today,pts:Math.round(mastPct(FICHES))});
    if(hist.length>90) hist.splice(0,hist.length-90);
    localStorage.setItem(HIST_KEY,JSON.stringify(hist));
  }catch(e){}
}
let _lastAnswerInfo={gain:0,penalty:0,streak:0,interval:1};

function mastPct(fiches){ const t=fiches.length; if(!t) return 0; return fiches.reduce((a,f)=>a+getPoints(f),0)/t; }
function mastCount(fiches){ return fiches.filter(f=>isMastered(f)).length; }
function mastProgressPct(fiches){ return Math.round(mastPct(fiches)); }
function getDueRefs(fiches){
  const today=new Date();
  return fiches.filter(f=>{
    const m=getMastery(f);
    if(!m.lastDate) return false;
    const last=new Date(m.lastDate);
    const diff=Math.floor((today-last)/(1000*60*60*24));
    return diff>=(m.interval||1);
  });
}
function srIsOverdue(f){
  const m=getMastery(f);
  if(!m.lastDate) return false;
  const diff=Math.floor((new Date()-new Date(m.lastDate))/(1000*60*60*24));
  return diff>(m.interval||1)*1.5;
}
function getRefStatus(f){
  const p=getPoints(f);
  if(p>=100) return {label:'Maîtrisée',color:'var(--green)'};
  if(p>=60)  return {label:'Solide',color:'var(--navy)'};
  if(p>=30)  return {label:'En progrès',color:'var(--gold2)'};
  if(p>0)    return {label:'Fragile',color:'var(--orange)'};
  return {label:'Non vue',color:'var(--t4)'};
}

function getWeight(f){
  const p=getPoints(f);
  const m=getMastery(f);
  let w=p>=100?0.32:p<30?3.1:p<60?2.1:1;
  if((m.streak||0)>=2) w*=0.72;
  if((m.streak||0)>=4) w*=0.55;
  if(m.attempts>0 && (m.streak||0)===0) w*=1.22;
  if(srIsOverdue(f)) w*=1.15;
  return Math.max(0.08, Math.min(w, 8));
}

// ══════════════════════════════════════════════════════════════════
function getStreak(){
  const today=new Date().toISOString().slice(0,10);
  let streak=0, d=new Date();
  for(let i=0;i<365;i++){
    const key=d.toISOString().slice(0,10);
    if(DAILY_LOG[key]) streak++;
    else if(i>0) break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function _getStoredBestStreak(){ try{ return parseInt(localStorage.getItem(BEST_STREAK_KEY)||'0'); }catch(e){ return 0; } }
function _updateBestStreak(s){ try{ const b=_getStoredBestStreak(); if(s>b) localStorage.setItem(BEST_STREAK_KEY,s); }catch(e){} }

function startTimer(){
  const TARGET=new Date('2026-04-14T01:00:00').getTime();
  function updateCountdown(){
    const now=Date.now();
    const diff=TARGET-now;
    const el=document.getElementById('countdown-display');
    if(!el) return;
    if(diff<=0){ el.innerHTML='<span style="color:var(--red)">Jour J !</span>'; return; }
    const days=Math.floor(diff/(1000*60*60*24));
    const hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const mins=Math.floor((diff%(1000*60*60))/(1000*60));
    if(days>0){
      el.innerHTML=`<span style="color:var(--gold2);font-weight:600">${days}</span><span style="color:var(--t4)">j</span> <span style="color:var(--gold2);font-weight:600">${hours}</span><span style="color:var(--t4)">h</span> <span style="color:var(--gold2);font-weight:600">${String(mins).padStart(2,'0')}</span><span style="color:var(--t4)">m</span>`;
    } else {
      el.innerHTML=`<span style="color:var(--red);font-weight:700">${hours}h${String(mins).padStart(2,'0')}</span>`;
    }
  }
  updateCountdown();
  setInterval(updateCountdown,30000);
}

    return true;

  return pool;

function buildCatChips(){
  const baseRefs=(qScopeRefs&&qScopeRefs.length)?qScopeRefs:FICHES;
  let html=`<button class="qcat-chip${qCatFilter==='all'?' active':''}" onclick="setQCat('all')" style="${qCatFilter==='all'?'background:var(--navy);border-color:var(--navy);color:#fff':''}">Tout <span class="qcat-count">${countQuestionsInRefs(baseRefs)}</span></button>`;
  Object.entries(DOMAINS).forEach(([dk,d])=>{
    const n=getFilteredFichesForQuiz(baseRefs.filter(f=>f.domain===dk)).reduce((acc,f)=>acc+(f.quizzes&&f.quizzes.length?f.quizzes.length:0),0);
    if(!n) return;
    const active=qCatFilter===dk;
    html+=`<button class="qcat-chip${active?' active':''}" onclick="setQCat('${dk}')" style="${active?'background:'+d.color+';border-color:'+d.color+';color:#fff':''}"><span class="qcat-pip" style="background:${d.color}"></span>${d.name} <span class="qcat-count">${n}</span></button>`;
  });
  return html;
}

function buildQueue(){
  const fichePool=qScopeRefs.filter(f=>{
    if(qChapterFilter!=='all' && getQuizChapterGroup(f.chapter)!==qChapterFilter) return false;
    if(qCatFilter!=='all' && f.domain!==qCatFilter) return false;
    if(qDiff==='notmastered') return !isMastered(f);
    if(qDiff==='weak') return isWeak(f);
    return true;
  });
  if(!fichePool.length) return [];

  const expanded=[];
  fichePool.forEach(f=>{
    const rawList=(f.quizzes&&f.quizzes.length)?f.quizzes:[buildFallbackQ(f)];
    rawList.forEach(rawQ=>{
      const q=normalizeQuizItem(f,rawQ);
      if(qDiff==='due' && !isQuizDue(f,q)) return;
      expanded.push({
        fiche:f,
        quiz:q,
        quizKey:getQuizKey(f,q),
        weight:getQuizWeight(f,q)
      });
    });
  });

  if(!expanded.length) return [];
  if(qSize>=9999){
    return expanded.slice().sort((a,b)=>(b.weight-a.weight) || (Math.random()-0.5));
  }
  return weightedSampleWithoutReplacement(expanded, qSize);
}


function buildFallbackQ(f){
  const correct=f.conditions&&f.conditions.length?f.conditions.join(' ; '):`Voir définition de "${f.title}"`;
  return normalizeQuizItem(f,{
    q:`Quelle affirmation de cours est correcte pour "${f.title}" ?`,
    correct,
    wrong:[generateGenericWrong(f,correct,[]),generateGenericWrong(f,correct,['']),generateGenericWrong(f,correct,['',''])]
  });
}

function shuffle(a){ const r=a.slice(); for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; } return r; }

function normalizeQuizString(str){
  return String(str??'').replace(/\s+/g,' ').trim();
}
function splitJustificationClauses(text){
  if(!text) return [];
  return String(text)
    .split(/\s*;\s*|\s+et\s+(?=[A-Za-z$\\])/i)
    .map(s=>s.trim())
    .filter(Boolean);
}
function generateGenericWrong(f,correctText,existing){
  const pool=[];
  const clauses=splitJustificationClauses(correctText);
  if(clauses.length>=2){
    pool.push(clauses[0]);
    pool.push(clauses.slice(1).join(' ; '));
    pool.push(clauses.slice(0,Math.max(1,clauses.length-1)).join(' ; '));
  }
  if(f&&Array.isArray(f.conditions)){
    if(f.conditions[0]) pool.push(f.conditions[0]);
    if(f.conditions.length>1) pool.push(f.conditions.slice(0,2).join(' ; '));
  }
  pool.push("Il suffit d'invoquer le théorème du cours.");
  pool.push("Une propriété vraie mais insuffisante pour conclure.");
  const banned=new Set([normalizeQuizString(correctText).toLowerCase(), ...(existing||[]).map(x=>normalizeQuizString(x).toLowerCase())]);
  for(const cand of pool){
    const key=normalizeQuizString(cand).toLowerCase();
    if(key && !banned.has(key)) return cand;
  }
  return "Réponse incomplète.";
}
function missingClauses(correctText,wrongText){
  const clauses=splitJustificationClauses(correctText);
  if(clauses.length<2) return [];
  const low=normalizeQuizString(wrongText).toLowerCase();
  return clauses.filter(c=>!low.includes(normalizeQuizString(c).toLowerCase()));
}
const QUIZ_RATIONALE_RULES=[{re:/vecteurs?\s+sont\s+deux\s+à\s+deux\s+différents|distinct/i,msg:"Des objets différents peuvent tout de même vérifier une relation linéaire ou ne pas satisfaire le critère demandé."},
  {re:/normes?\s+différentes?/i,msg:"La norme ne fournit pas ici le critère de cours attendu."},
  {re:/aucun.*nul|n['’]est\s+nul|non\s+nul/i,msg:"L'absence d'objet nul ne suffit pas à conclure."},
  {re:/déterminant/i,msg:"Le déterminant peut être un outil dans un cadre carré précis, mais ce n'est pas la justification générale attendue si ce cadre n'est pas explicitement posé."},
  {re:/colinéaire/i,msg:"La non-colinéarité n'est pertinente que dans des cas particuliers, par exemple pour deux vecteurs."},
  {re:/indépendan/i,msg:"Tu invoques l'indépendance alors que la justification demandée repose ici sur une autre hypothèse."},
  {re:/incompatib/i,msg:"L'incompatibilité sert à annuler une intersection et à sommer une réunion ; elle ne remplace pas toutes les autres hypothèses."},
  {re:/continue/i,msg:"La continuité peut être nécessaire, mais à elle seule elle ne suffit pas ici."},
  {re:/croissante/i,msg:"C'est une propriété souvent utile mais insuffisante pour conclure seule."},
  {re:/positive/i,msg:"La positivité seule ne caractérise pas l'objet demandé."},
  {re:/intégrale.*1|vaut\s*1/i,msg:"Une égalité d'intégrale peut être utile, mais elle ne constitue pas à elle seule la justification complète ici."},
  {re:/probabilité\s+non\s+nulle|équiprobable/i,msg:"Cette propriété n'est pas la justification théorique demandée."}];
function buildWrongRationale(f,q,wrongText,correctText){
  const low=normalizeQuizString(wrongText).toLowerCase();
  for(const rule of QUIZ_RATIONALE_RULES){
    if(rule.re.test(low)) return rule.msg;
  }
  const missing=missingClauses(correctText,wrongText);
  if(missing.length && missing.length<Math.max(2,splitJustificationClauses(correctText).length)){
    return `Réponse insuffisante : il manque ${missing.length===1?'une condition ou une étape':'des conditions ou des étapes'} de la justification complète (${missing.slice(0,2).join(' ; ')}).`;
  }
  if(low && normalizeQuizString(correctText).toLowerCase().includes(low) && low!==normalizeQuizString(correctText).toLowerCase()){
    return "La proposition ne reprend qu'une partie du raisonnement. En concours, il faut donner la justification complète.";
  }
  return "Réponse plausible, mais elle ne suffit pas pour justifier rigoureusement la conclusion demandée.";
}
function buildCorrectRationale(f,q,correctText){
  if(q&&q.explanation) return q.explanation;
  const clauses=splitJustificationClauses(correctText);
  if(clauses.length>=2) return "C'est la seule proposition qui donne la chaîne logique complète attendue dans une copie.";
  return "C'est la formulation de cours attendue pour obtenir tous les points de justification.";
}
function normalizeQuizItem(f,q){
  if(!q) q={};
  if(q.__normalized) return q;
  const prompt=q.prompt||q.q||q.question||`Quelle affirmation de cours est correcte pour « ${f.title} » ?`;
  let correctText=normalizeQuizString(q.correct||q.courseAnswer||((f.conditions&&f.conditions.length)?f.conditions.join(' ; '):f.summary||f.title));
  let options=[];
  if(Array.isArray(q.options)&&q.options.length){
    options=q.options.map((opt,idx)=>({
      id:opt.id||`opt${idx}`,
      text:normalizeQuizString(opt.text||opt.label||opt.answer||''),
      correct:!!opt.correct,
      rationale:opt.rationale||opt.justification||''
    })).filter(opt=>opt.text);
    const explicitCorrect=options.find(opt=>opt.correct);
    if(explicitCorrect) correctText=explicitCorrect.text;
  }else{
    const wrongTexts=(Array.isArray(q.wrong)?q.wrong:[]).filter(Boolean).map(normalizeQuizString);
    while(wrongTexts.length<3) wrongTexts.push(generateGenericWrong(f,correctText,wrongTexts));
    options=[{id:'opt0',text:correctText,correct:true,rationale:q.correct_rationale||buildCorrectRationale(f,q,correctText)}]
      .concat(wrongTexts.slice(0,3).map((txt,idx)=>({id:`opt${idx+1}`,text:txt,correct:false,rationale:buildWrongRationale(f,q,txt,correctText)})));
  }
  const seen=new Set(), dedup=[];
  options.forEach((opt,idx)=>{
    const key=normalizeQuizString(opt.text).toLowerCase();
    if(!key || seen.has(key)) return;
    seen.add(key);
    dedup.push({
      id:opt.id||`opt${idx}`,
      text:opt.text,
      correct:!!opt.correct,
      rationale:opt.rationale||''
    });
  });
  options=dedup;
  let correctOpt=options.find(opt=>opt.correct);
  if(!correctOpt){
    if(!options.length){
      options=[{id:'opt0',text:correctText,correct:true,rationale:buildCorrectRationale(f,q,correctText)}];
    }else{
      options[0].correct=true;
    }
    correctOpt=options.find(opt=>opt.correct)||options[0];
  }
  const wrongOpts=options.filter(opt=>!opt.correct);
  while(wrongOpts.length<3){
    const txt=generateGenericWrong(f,correctOpt.text,wrongOpts.map(o=>o.text));
    wrongOpts.push({id:`fill${wrongOpts.length}`,text:txt,correct:false,rationale:buildWrongRationale(f,q,txt,correctOpt.text)});
  }
  const finalOptions=[correctOpt,...wrongOpts.slice(0,3)].map((opt,idx)=>({
    id:opt.id||`opt${idx}`,
    text:opt.text,
    correct:idx===0 ? true : false,
    rationale:opt.rationale || (idx===0 ? buildCorrectRationale(f,q,correctOpt.text) : buildWrongRationale(f,q,opt.text,correctOpt.text))
  }));
  return Object.assign({},q,{
    q:prompt,
    options:finalOptions,
    correct:correctOpt.text,
    explanation:q.correctionBody||q.explanation||`Pour avoir tous les points, il fallait choisir la formulation complète : ${correctOpt.text}`,
    __normalized:true
  });
}
function buildOptionReviewHtml(options,selectedId){
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  return `<div class="qreview-block">
    <div class="qreview-title">Justification des propositions</div>
    <div class="qreview-list">
      ${options.map((opt,idx)=>{
        const cls=[opt.correct?'correct':'',(!opt.correct&&selectedId===opt.id)?'selectedWrong':'',selectedId===opt.id?'selected':''].filter(Boolean).join(' ');
        const badge=opt.correct?'bonne réponse':(selectedId===opt.id?'réponse choisie':'à écarter');
        return `<div class="qreview-item ${cls}">
          <div class="qreview-letter">${letters[idx]||idx+1}</div>
          <div class="qreview-body">
            <div class="qreview-answer">${sanitizeMathText(opt.text)}</div>
            <div class="qreview-rationale">${sanitizeMathText(opt.rationale||'')}</div>
          </div>
          <div class="qreview-badge">${badge}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

  // radar
  const cats=Object.keys(DOMAINS);

    const angle=-Math.PI/2+angleStep*i;

    if(p<100) axisSvg+=`<text x="${cx+3}" y="${cy-r2+3}" fill="rgba(255,255,255,.15)" font-size="7" font-family="'DM Mono',monospace">${p}%</text>`;
  });
  cats.forEach((dk,i)=>{
    const angle=-Math.PI/2+angleStep*i;
    const x2=cx+Math.cos(angle)*maxR, y2=cy+Math.sin(angle)*maxR;
    axisSvg+=`<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>`;
    const col=DOMAIN_COLORS[dk]||'#888';
    const dom=DOMAINS[dk];
    const lx=cx+Math.cos(angle)*(maxR+18), ly=cy+Math.sin(angle)*(maxR+18);
    axisSvg+=`<text x="${lx}" y="${ly+4}" text-anchor="middle" fill="${col}" font-size="9" font-family="'DM Mono',monospace">${dom.name.slice(0,5)}</text>`;
  });
  const polySvg=`<polygon points="${polyPts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="rgba(74,122,184,.18)" stroke="var(--navy)" stroke-width="2" stroke-linejoin="round"/>`;
  let dotsSvg=''; cats.forEach((dk,i)=>{
    const pctD=mastPct(FICHES.filter(f=>f.domain===dk));
    const angle=-Math.PI/2+angleStep*i;
    const px=cx+Math.cos(angle)*maxR*(pctD/100), py=cy+Math.sin(angle)*maxR*(pctD/100);

    dotsSvg+=`<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5" fill="${col}" stroke="var(--bg)" stroke-width="2"/>`;
  });
  radarHtml=`<svg viewBox="0 0 240 240">${axisSvg}${polySvg}${dotsSvg}</svg>`;
  const radarLeg=cats.map(dk=>{
    const col=DOMAIN_COLORS[dk]||'#888'; const p=Math.round(mastPct(FICHES.filter(f=>f.domain===dk)));
    return `<div class="radar-leg-item"><div class="radar-leg-dot" style="background:${col}"></div><span style="color:${col}">${DOMAINS[dk].name}</span><span style="color:var(--t4)">${p}%</span></div>`;
  }).join('');

  // per-domain breakdown
  let domRows='';

    domRows+=`<div class="prog-row" onclick="go('${dk}')">
      <span class="nav-pip" style="background:${d.color};width:8px;height:8px;border-radius:50%;flex-shrink:0"></span>

      <span class="prog-pct" style="color:${d.color}">${dPct}%</span>
    </div>`;
    Object.entries(d.chapters).forEach(([ck,cname])=>{
      const cRefs=dRefs.filter(f=>f.chapter===ck); if(!cRefs.length) return;
      const cPct=Math.round(mastPct(cRefs));
      domRows+=`<div class="prog-row" onclick="showChapterPanel('${dk}','${ck}')" style="padding-left:24px">
        <span style="font-family:var(--ff-mono);font-size:8px;color:var(--t5);flex-shrink:0">└─</span>
        <span class="prog-label" style="font-size:11px">${cname}</span>
        <div class="prog-bar"><div class="prog-fill" style="width:${cPct}%;background:${d.color}"></div></div>
        <span class="prog-pct" style="color:${d.color};font-size:10px">${cPct}%</span>
      </div>`;
    });
  });

  container.innerHTML=`<div class="content-inner">
  <div class="ph">
    <div class="ph-l">
      <div class="ph-eye">Vue globale</div>
      <div class="ph-title">Progression</div>
      <div class="ph-meta">
        <div class="ph-mi"><strong>${mastered}</strong> maîtrisées</div>
        <div class="ph-mi"><strong>${FICHES.length}</strong> fiches total</div>
        <div class="ph-mi"><strong>${getDueRefs(FICHES).length}</strong> à réviser</div>
      </div>
    </div>
    <div class="ph-ring">
      <div class="ring-w" style="width:80px;height:80px">
        <svg width="80" height="80" viewBox="0 0 80 80" style="transform:rotate(-90deg)">
          <circle cx="40" cy="40" r="${rad}" fill="none" stroke="var(--s3)" stroke-width="5"/>
          <circle cx="40" cy="40" r="${rad}" fill="none" stroke="var(--gold2)" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${(circ*(1-pct/100)).toFixed(1)}" style="transition:stroke-dashoffset 1s ease;transform-origin:center"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:14px;font-weight:700;color:var(--gold2)">${pct}%</div>
      </div>
      <div class="ring-lbl">Maîtrise</div>
    </div>
  </div>

  <div class="streak-card">
    <div class="streak-icon">🔥</div>
    <div class="streak-info">
      <div class="streak-n">${streak} jour${streak>1?'s':''}</div>
      <div class="streak-label">Série en cours · Meilleure : ${bestStreak}j</div>
      <div class="streak-cal">${calHtml}</div>
    </div>
  </div>

  <div class="radar-wrap">
    <div class="prog-sec-title">Carte mentale — maîtrise par domaine</div>
    <div class="radar-svg-wrap">${radarHtml}</div>
    <div class="radar-leg">${radarLeg}</div>
  </div>

  <div class="prog-section">
    <div class="prog-sec-title">Par domaine & chapitre</div>
    ${domRows}
  </div>

  <div class="chart-wrap">
    <div class="chart-hdr">
      <span class="chart-ttl">Historique de progression</span>
      <div class="chart-tabs">
        <button class="chart-tab ${chartPeriod===7?'active':''}" onclick="chartPeriod=7;renderHomeChart()">7j</button>

        <button class="chart-tab ${chartPeriod===30?'active':''}" onclick="chartPeriod=30;renderHomeChart()">30j</button>
      </div>

  setTimeout(()=>{ const ca=document.getElementById('home-chart-area'); if(ca) renderChart(ca,chartPeriod); },50);
}

let chartPeriod=14;
function renderHomeChart(){ const ca=document.getElementById('home-chart-area'); if(!ca) return; document.querySelectorAll('.chart-tab').forEach(t=>t.classList.toggle('active',parseInt(t.textContent)===chartPeriod)); renderChart(ca,chartPeriod); }
function renderChart(container,days){
  try{
    const hist=JSON.parse(localStorage.getItem(HIST_KEY)||'[]');
    const today=new Date();
    const pts=[];
    for(let i=days-1;i>=0;i--){
      const d=new Date(today); d.setDate(d.getDate()-i);
      const key=d.toISOString().slice(0,10);
      const found=hist.filter(h=>h.date===key);
      pts.push({date:key,v:found.length?found[found.length-1].pts:null});
    }
    let last=0;
    for(let i=0;i<pts.length;i++){ if(pts[i].v===null) pts[i].v=last; else last=pts[i].v; }
    const maxV=Math.max(...pts.map(p=>p.v),1);
    const W=container.offsetWidth||400, H=80;
    const pad={l:28,r:8,t:6,b:18};
    const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
    const xS=(i)=>pad.l+i/(pts.length-1)*iw;
    const yS=(v)=>pad.t+ih*(1-v/100);
    const path=pts.map((p,i)=>(i===0?'M':'L')+xS(i).toFixed(1)+','+yS(p.v).toFixed(1)).join(' ');
    const fillPath=path+` L${xS(pts.length-1).toFixed(1)},${(pad.t+ih).toFixed(1)} L${xS(0).toFixed(1)},${(pad.t+ih).toFixed(1)} Z`;
    const labels=pts.filter((_,i)=>i%(Math.ceil(pts.length/5))===0).map((p,_,arr)=>{
      const i=pts.indexOf(p);
      const d=new Date(p.date); const label=(d.getDate())+'/'+String(d.getMonth()+1).padStart(2,'0');
      return `<text x="${xS(i).toFixed(1)}" y="${H-2}" font-size="8" text-anchor="middle" fill="var(--t5)" font-family="'DM Mono',monospace">${label}</text>`;
    }).join('');
    const yLabels=[0,50,100].map(v=>`<text x="${pad.l-3}" y="${(yS(v)+3).toFixed(1)}" font-size="7" text-anchor="end" fill="var(--t5)" font-family="'DM Mono',monospace">${v}%</text>`).join('');
    container.innerHTML=`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}">
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--navy)" stop-opacity=".25"/><stop offset="100%" stop-color="var(--navy)" stop-opacity="0"/></linearGradient></defs>
      <path d="${fillPath}" fill="url(#cg)"/>
      <path d="${path}" fill="none" stroke="var(--navy)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${labels}${yLabels}
    </svg>`;
  }catch(e){ container.innerHTML='<div style="font-family:var(--ff-mono);font-size:10px;color:var(--t4);padding:16px;text-align:center">Pas encore de données</div>'; }
}

const DQ_N=5;
const DQ_KEY='dq_math_results';
const DQ_DONE_KEY='dq_math_done';

function _seededRng(seed){ let s=seed; return ()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; }; }
function _dqDateSeed(){ const d=new Date(); return parseInt(`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`); }


function _dqBuildQuestions(){
  const rng=_seededRng(_dqDateSeed());
  const pool=FICHES.filter(f=>f.quizzes&&f.quizzes.length);
  if(!pool.length) return [];
  const picked=[];
  for(let i=0;i<DQ_N;i++){
    const f=pool[Math.floor(rng()*pool.length)];
    const q=normalizeQuizItem(f,f.quizzes[Math.floor(rng()*f.quizzes.length)]);
    const options=shuffle((q.options||[]).map(opt=>Object.assign({},opt)));
    picked.push({fiche:f,quiz:q,options,correctId:(options.find(opt=>opt.correct)||{}).id});
  }
  return picked;
}


function _dqIsDoneToday(){
  try{ const s=JSON.parse(localStorage.getItem(DQ_DONE_KEY)||'{}'); const today=new Date().toISOString().slice(0,10); return s.date===today; }catch(e){ return false; }
}
function _dqMarkDone(score){
  const today=new Date().toISOString().slice(0,10);
  try{ localStorage.setItem(DQ_DONE_KEY,JSON.stringify({date:today,score})); }catch(e){}
}
function _dqCheckBadge(){

}

function renderDqQ(container){
  if(_dqIdx>=_dqQ.length){ showDqFinal(container); return; }
  const item=_dqQ[_dqIdx]; const {fiche:f,options}=item;
  const dom=DOMAINS[f.domain]; const col=dom?dom.color:'var(--navy)';
  const dqContext = item.quiz.context ? `<div style="background:var(--s2);border:1px solid var(--bd);border-left:3px solid ${col};border-radius:6px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:var(--t2);line-height:1.6">${sanitizeMathText(item.quiz.context)}</div>` : '';
  const dqVisual = item.quiz.visual ? `<div class="qvisual" style="display:block;margin-bottom:10px;padding:10px;border:1px solid var(--bd);border-radius:8px;background:var(--s2)">${sanitizeMathText(item.quiz.visual)}</div>` : '';
  container.innerHTML=`<div style="margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-family:var(--ff-mono);font-size:9px;color:var(--t4)">Q${_dqIdx+1}/${DQ_N}</span>
      <span style="font-family:var(--ff-mono);font-size:8px;padding:2px 6px;border-radius:3px;background:${col}15;color:${col};border:1px solid ${col}30">${TYPE_LABELS[f.type]||f.type}</span>

    <div style="display:flex;flex-direction:column;gap:5px" id="dq-opts">
    ${options.map((opt,i)=>`<button class="qopt" data-option-id="${opt.id}" data-idx="${String.fromCharCode(65+i)}" onclick="dqAnswer(${i})">${sanitizeMathText(opt.text)}</button>`).join('')}
    </div>
    <div id="dq-fb" style="display:none;margin-top:10px"></div>
    <div id="dq-next" style="display:none;margin-top:8px"><button class="qnbtn qng" onclick="dqNext()">Suivant →</button></div>
  </div>`;
  setTimeout(()=>renderMathIn(container),30);

function dqAnswer(selectedIdx){
  if(_dqAnswered) return;
  _dqAnswered=true;
  const item=_dqQ[_dqIdx];
  const options=item.options||[];
  const selected=options[selectedIdx];
  const correctOption=options.find(opt=>opt.correct)||options[0];
  if(!selected || !correctOption) return;
  const ok=!!selected.correct;
  if(ok) _dqScore++;
  _dqResults.push(ok);
  recordQuizAnswer(item.fiche,item.quiz,ok);
  recordAnswer(item.fiche,ok);
  updateUI();
  document.querySelectorAll('#dq-opts .qopt').forEach((b,i)=>{
    const opt=options[i];
    b.disabled=true;
    if(opt&&opt.correct) b.classList.add('correct');
    else if(i===selectedIdx&&!ok) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  const explanation=item.quiz.explanation||'';
  const fb=document.getElementById('dq-fb');
  if(fb){
    fb.style.display='';
    fb.style.background=ok?'var(--greenbg)':'var(--redbg)';
    fb.style.border='1px solid '+(ok?'rgba(58,154,114,.2)':'rgba(209,82,72,.2)');
    fb.style.borderLeft='3px solid '+(ok?'var(--green)':'var(--red)');
    fb.style.borderRadius='6px';
    fb.style.padding='10px 14px';
    fb.innerHTML=`<div style="font-family:var(--ff-mono);font-size:11px;font-weight:700;color:${ok?'var(--green)':'var(--red)'};margin-bottom:6px">${ok?'✓ Correct !':'✗ Incorrect'}</div>
      ${!ok?`<div style="margin-bottom:8px"><div style="font-family:var(--ff-mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--red);margin-bottom:4px">Ta réponse</div><div style="font-size:13px;color:var(--t1);line-height:1.5">${sanitizeMathText(selected.text)}</div><div style="font-size:12px;color:var(--t3);line-height:1.6;margin-top:6px">${sanitizeMathText(selected.rationale||'')}</div></div>`:''}
      <div style="margin-bottom:8px"><div style="font-family:var(--ff-mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:4px">Bonne réponse</div><div style="font-size:13px;color:var(--t1);line-height:1.5">${sanitizeMathText(correctOption.text)}</div><div style="font-size:12px;color:var(--t3);line-height:1.6;margin-top:6px">${sanitizeMathText(correctOption.rationale||'')}</div></div>
      ${explanation?`<div style="padding-top:8px;border-top:1px solid var(--bd)"><div style="font-family:var(--ff-mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--navy);margin-bottom:4px">💡 Explication</div><div style="font-size:12px;color:var(--t2);line-height:1.6">${sanitizeMathText(explanation)}</div></div>`:''}`;
    renderMathIn(fb);
  }
  const next=document.getElementById('dq-next'); if(next) next.style.display='';
}


function dqNext(){
  _dqAnswered=false;
  _dqIdx++;
  const body=document.getElementById('dq-body'); if(body) renderDqQ(body);
}

function _sanitizeStorageKey(s){ return s.replace(/[\s\/\\"']/g,'_'); }

async function loadDqLeaderboard(){
  const el=document.getElementById('dq-leaderboard'); if(!el) return;
  if(!_ablyReady){ el.innerHTML='<div style="font-family:var(--ff-mono);font-size:10px;color:var(--t4);text-align:center;padding:12px">Connexion au serveur en cours...</div>'; return; }
  try{
    const today=new Date().toISOString().slice(0,10);
    const prefix='dq_math:'+today+':';
    let listResult=null;
    try{ listResult=await storageList(prefix,true); }catch(e){ listResult=null; }
    if(!listResult||!listResult.keys||!listResult.keys.length){
      el.innerHTML='<div style="font-family:var(--ff-mono);font-size:10px;color:var(--t4);text-align:center;padding:12px">Aucun résultat pour aujourd\'hui.</div>';
      return;
    }
    const entries=[];
    for(const k of listResult.keys){
      try{
        const r=await storageGet(k,true);
        if(r&&r.value) entries.push(JSON.parse(r.value));
      }catch(e){ /* skip bad key */ }
    }
    if(!entries.length){
      el.innerHTML='<div style="font-family:var(--ff-mono);font-size:10px;color:var(--t4);text-align:center;padding:12px">Aucun résultat pour aujourd\'hui.</div>';
      return;
    }
    const valid=entries.filter(e=>e&&e.name&&e.score!==undefined).sort((a,b)=>b.score-a.score||(a.ts-b.ts));
    const medals=['🥇','🥈','🥉'];
    el.innerHTML=valid.map((u,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;background:var(--s2);margin-bottom:4px;border:1px solid ${_currentUser&&u.name===_currentUser.name?u.color||'var(--navy)':'var(--bd)'}">
      <span style="font-family:var(--ff-mono);font-size:12px;min-width:20px">${medals[i]||'#'+(i+1)}</span>
      <div style="width:20px;height:20px;border-radius:50%;background:${u.color||'var(--t4)'};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0">${(u.name||'?')[0].toUpperCase()}</div>
      <span style="flex:1;font-size:12px;color:var(--t2)">${u.name}</span>
      <span style="font-family:var(--ff-mono);font-size:12px;font-weight:700;color:${u.score===DQ_N?'var(--green)':'var(--t2)'}">${u.score}/${DQ_N}</span>
    </div>`).join('');
  }catch(e){ el.innerHTML='<div style="font-family:var(--ff-mono);font-size:10px;color:var(--t4);text-align:center;padding:12px">Erreur de chargement.</div>'; }
}

const _sbTitleChoice={};

function sbSelectTitle(userName,titleIdx){
  if(!_currentUser||_currentUser.name!==userName) return;
  const score=Math.round(mastPct(FICHES));
  if(score<SB_TITLES[titleIdx].min) return;
  _sbTitleChoice[userName]=titleIdx;
  try{ localStorage.setItem('ecg_title_'+userName,titleIdx); }catch(e){}
  // Refresh scoreboard
  if(_currentView==='scoreboard') go('scoreboard');
}


function getSbTitle(userName,score){
  let max=0; SB_TITLES.forEach((t,i)=>{ if(score>=t.min) max=i; });
  const chosen=_sbTitleChoice[userName];
  if(chosen!==undefined&&chosen<=max) return SB_TITLES[chosen];
  return SB_TITLES[max];
}
function getSbTitleIdx(userName,score){
  let max=0; SB_TITLES.forEach((t,i)=>{ if(score>=t.min) max=i; });
  return max;
}
function loadSbTitleChoice(name){ try{ const v=localStorage.getItem('ecg_title_'+name); if(v!==null) _sbTitleChoice[name]=parseInt(v); }catch(e){} }
