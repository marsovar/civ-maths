  function __buildDuelQuestions(roomId){
    const rng = _seededRng(__hashString(roomId));
    const pool = [];
    FICHES.forEach(f => {
      const rawList = (f.quizzes && f.quizzes.length) ? f.quizzes : [buildFallbackQ(f)];
      rawList.forEach(rawQ => pool.push({fiche:f, quiz:normalizeQuizItem(f, rawQ)}));
    });
    const selected = [];
    const work = pool.slice();
    const targetCount = Math.min(5, work.length);
    while(selected.length < targetCount && work.length){
      const idx = Math.floor(rng() * work.length);
      const item = work.splice(idx, 1)[0];
      item.runtimeOptions = __shuffleWithRng((item.quiz.options || []).map(opt => Object.assign({}, opt)), rng);
      selected.push(item);
    }
    return selected;
  }

  function __renderDuelQuestion(){
    if(!_duelState || _duelState.phase !== 'playing') return;
    const content = document.getElementById('content');
    if(!content) return;
    const item = _duelState.questions[_duelState.index];
    if(!item){ __finishDuelRound(); return; }
    const total = _duelState.questions.length;
    const pct = Math.round((_duelState.index / total) * 100);
    content.innerHTML = `<div class="content-inner qwrap">
      <div class="qhdr">
        <div class="qhdr-title">Duel contre ${_duelState.opponent}</div>
        <div class="qhdr-sub">Salle ${_duelState.roomId.split(':').pop()} · ${_duelState.index + 1}/${total}</div>
      </div>
      <div class="qnav">
        <div class="ql"><span>Score <strong>${_duelState.score}</strong></span><span>Questions <strong>${_duelState.index + 1}/${total}</strong></span></div>
        <div class="qpf-wrap"><div class="qpf" style="width:${pct}%"></div></div>
      </div>
      <div class="qcard" id="duel-card">
        <div class="qmode-label">⚔️ Duel en direct</div>
        <div class="qquestion" id="duel-question">${sanitizeMathText(item.quiz.q || item.quiz.prompt || item.fiche.title)}</div>
      </div>
      <div class="quiz-opts" id="duel-options"></div>
      <div class="qfb" id="duel-feedback" style="display:none"></div>
      <div class="qnext" id="duel-next" style="display:none"><button class="qnbtn qng" onclick="__duelNext()">Suivant →</button></div>
    </div>`;
    const opts = document.getElementById('duel-options');
    (item.runtimeOptions || []).forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'qopt';
      btn.dataset.idx = String.fromCharCode(65 + idx);
      btn.innerHTML = sanitizeMathText(opt.text);
      btn.onclick = () => __answerDuel(idx);
      opts.appendChild(btn);
      renderMathIn(btn);
    });
    renderMathIn(document.getElementById('duel-question'));
  }

  function __answerDuel(selectedIdx){
    if(!_duelState || _duelState.phase !== 'playing' || _duelState.answered) return;
    const item = _duelState.questions[_duelState.index];
    const options = item.runtimeOptions || [];
    const selected = options[selectedIdx];
    const correct = options.find(o => o.correct) || options[0];
    if(!selected || !correct) return;
    _duelState.answered = true;
    const ok = !!selected.correct;
    if(ok) _duelState.score += 1;
    _duelState.answers.push({correct:ok, selected:selected.text, correctText:correct.text});
    document.querySelectorAll('#duel-options .qopt').forEach((btn, idx) => {
      const opt = options[idx];
      btn.disabled = true;
      if(opt?.correct) btn.classList.add('correct');
      else if(idx === selectedIdx && !ok) btn.classList.add('wrong');
      else btn.classList.add('dimmed');
    });
    const fb = document.getElementById('duel-feedback');
    if(fb){
      fb.style.display = 'block';
      fb.style.borderLeftColor = ok ? 'var(--green)' : 'var(--red)';
      fb.innerHTML = `<div class="qfv" style="color:${ok?'var(--green)':'var(--red)'}">${ok?'✓ Correct':'✗ Incorrect'}</div>
        <div style="font-size:13px;color:var(--t2);line-height:1.65">Réponse attendue : ${sanitizeMathText(correct.text)}</div>`;
      renderMathIn(fb);
    }
    const next = document.getElementById('duel-next');
    if(next) next.style.display = '';
  }

  function __duelNext(){
    if(!_duelState) return;
    _duelState.index += 1;
    _duelState.answered = false;
    if(_duelState.index >= _duelState.questions.length) __finishDuelRound();
    else __renderDuelQuestion();
  }

  async function __persistDuelResult(result){
    try{ await storageSet('duel_result:' + _duelState.roomId + ':' + sbUserKey(result.player), JSON.stringify(result), true); }catch(e){}
  }

  async function __updateMyDuelStats(outcome){
    const me = _usersCache.find(u => _currentUser && u.name === _currentUser.name) || {};
    const duelsPlayed = (me.duelsPlayed || 0) + 1;
    const duelsWon = (me.duelsWon || 0) + (outcome === 'win' ? 1 : 0);
    await sbPushMyStats({duelsPlayed, duelsWon});
  }

  async function __finalizeDuelIfReady(){
    if(!_duelState || !_duelState.myResult || !_duelState.opponentResult || _duelState.phase === 'finished') return;
    const mine = _duelState.myResult;
    const opp = _duelState.opponentResult;
    let outcome = 'draw';
    if(mine.score > opp.score) outcome = 'win';
    else if(mine.score < opp.score) outcome = 'loss';
    const result = {
      roomId: _duelState.roomId,
      ts: Date.now(),
      player: mine.player,
      opponent: opp.player,
      score: mine.score,
      opponentScore: opp.score,
      total: mine.total,
      time: mine.time,
      opponentTime: opp.time,
      result: outcome
    };
    await __persistDuelResult(result);
    await __updateMyDuelStats(outcome);
    _duelState.phase = 'finished';
    const content = document.getElementById('content');
    if(content){
      const color = outcome === 'win' ? 'var(--green)' : outcome === 'loss' ? 'var(--red)' : 'var(--gold2)';
      const label = outcome === 'win' ? 'Victoire' : outcome === 'loss' ? 'Défaite' : 'Égalité';
      content.innerHTML = `<div class="content-inner"><div class="qfinal">
        <div class="qfl">Duel terminé</div>
        <div class="qfs" style="color:${color}">${label}</div>
        <div class="qfmsg">${mine.player} : ${mine.score}/${mine.total} · ${opp.player} : ${opp.score}/${opp.total}</div>
        <div class="qfacts"><button class="qnbtn qng" onclick="go('scoreboard')">Retour au scoreboard</button></div>
      </div></div>`;
    }
    _duelState = null;
    setTimeout(()=>{ if(_currentView === 'scoreboard'){ const c = document.getElementById('sb-content'); if(c) sbRenderDuelsTab(c); } }, 100);
  }

  _onOpponentDuelResult = function(data){
    if(!_duelState || data.roomId !== _duelState.roomId) return;
    _duelState.opponentResult = data;
    __finalizeDuelIfReady();
  }

  async function __finishDuelRound(){
    if(!_duelState) return;
    const elapsed = Math.max(1, Math.round((Date.now() - _duelState.startedAt) / 1000));
    _duelState.myResult = {
      roomId: _duelState.roomId,
      player: _currentUser.name,
      opponent: _duelState.opponent,
      score: _duelState.score,
      total: _duelState.questions.length,
      time: elapsed,
      ts: Date.now()
    };
    _duelState.phase = 'waiting-result';
    const content = document.getElementById('content');
    if(content){
      content.innerHTML = `<div class="content-inner"><div style="text-align:center;padding:60px 20px"><div style="font-size:34px;margin-bottom:16px">⏳</div><div style="font-family:var(--ff-ser);font-size:22px;color:var(--t1);margin-bottom:8px">Résultat envoyé</div><div style="font-family:var(--ff-mono);font-size:11px;color:var(--t4)">En attente de ${_duelState.opponent}…</div></div></div>`;
    }
    try{ await _ablyChannel(ONLINE_DUELS_CHANNEL).publish('result', _duelState.myResult); }catch(e){}
    __finalizeDuelIfReady();
  }

  _startDuel = function(opponent, roomId, inviter){
    _duelState = {
      phase: 'playing',
      roomId: roomId,
      opponent: opponent,
      inviter: !!inviter,
      questions: __buildDuelQuestions(roomId),
      index: 0,
      score: 0,
      answers: [],
      startedAt: Date.now(),
      answered: false,
      myResult: null,
      opponentResult: null
    };
    __renderDuelQuestion();
  }

  sbRequestDuel = async function(targetName){
    if(!_currentUser || !_ablyReady) return;
    if(_duelState) return;
    if(!isUserOnline(targetName)){
      const c = document.getElementById('content');
      if(c) c.innerHTML = `<div class="content-inner"><div style="text-align:center;padding:40px;font-family:var(--ff-mono);font-size:11px;color:var(--t4)">${targetName} n'est plus en ligne.<br><button class="qnbtn" style="margin-top:12px" onclick="go('scoreboard')">Retour</button></div></div>`;
      return;
    }
    const roomId = 'duel:' + Date.now() + ':' + __hashString([_currentUser.name, targetName].sort().join('|'));
    _duelState = {phase:'waiting', roomId, opponent:targetName, inviter:true, startedAt:Date.now()};
    const c = document.getElementById('content');
    if(c){
      c.innerHTML = `<div class="content-inner"><div style="text-align:center;padding:60px 20px">
        <div style="font-size:36px;margin-bottom:16px">⚔️</div>
        <div style="font-family:var(--ff-ser);font-size:22px;font-weight:600;color:var(--gold2);margin-bottom:8px">Défi envoyé à ${targetName}</div>
        <div style="font-family:var(--ff-mono);font-size:11px;color:var(--t4);margin-bottom:24px">En attente de l'acceptation…</div>
        <div style="width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--gold2);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px"></div>
        <button class="qnbtn" onclick="_cancelDuelRequest('${targetName.replace(/'/g, "\\'")}', '${roomId}')">Annuler</button>
      </div></div>`;
    }
    try{ await _ablyChannel(ONLINE_DUELS_CHANNEL).publish('invite', {roomId, from:_currentUser.name, to:targetName, ts:Date.now()}); }catch(e){}
    setTimeout(() => {
      if(_duelState?.phase === 'waiting' && _duelState.roomId === roomId){
        _duelState = null;
        const content = document.getElementById('content');
        if(content) content.innerHTML = `<div class="content-inner"><div style="text-align:center;padding:40px;font-family:var(--ff-mono);font-size:11px;color:var(--t4)">${targetName} n'a pas répondu.<br><button class="qnbtn" onclick="go('scoreboard')" style="margin-top:12px">Retour</button></div></div>`;
      }
    }, 60000);
  }

  _cancelDuelRequest = async function(targetName, roomId){
    _duelState = null;
    try{ await _ablyChannel(ONLINE_DUELS_CHANNEL).publish('cancel', {roomId, from:_currentUser?.name, to:targetName, ts:Date.now()}); }catch(e){}
    go('scoreboard');
  }

  _acceptDuel = async function(from, roomId){
    document.getElementById('duel-notif-banner')?.remove();
    if(!_currentUser || !_ablyReady) return;
    try{ await _ablyChannel(ONLINE_DUELS_CHANNEL).publish('accept', {roomId, from:_currentUser.name, to:from, ts:Date.now()}); }catch(e){}
    _startDuel(from, roomId, false);
  }

  _declineDuel = async function(from, roomId){
    document.getElementById('duel-notif-banner')?.remove();
    if(!_currentUser || !_ablyReady) return;
    try{ await _ablyChannel(ONLINE_DUELS_CHANNEL).publish('decline', {roomId, from:_currentUser.name, to:from, ts:Date.now()}); }catch(e){}
  }

  sbRenderDuelsTab = async function(container){
    if(!_ablyReady){ container.innerHTML = '<div style="text-align:center;padding:32px;font-family:var(--ff-mono);font-size:10px;color:var(--t4)">Connexion au serveur en cours...</div>'; return; }
    container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--t4);font-family:var(--ff-mono);font-size:10px">Chargement…</div>';
    try{
      const listResult = await storageList('duel_result:', true);
      const keys = (listResult?.keys || []).slice(-40);
      if(!keys.length){ container.innerHTML = '<div style="text-align:center;padding:32px;font-family:var(--ff-mono);font-size:11px;color:var(--t4)">Aucun duel joué pour l\'instant.<br><span style="font-size:10px">Défie un ami depuis le classement.</span></div>'; return; }
      const raws = await Promise.all(keys.map(k => storageGet(k, true).catch(()=>null)));
      const duels = raws.filter(Boolean).map(r => { try{return JSON.parse(r.value);}catch(e){return null;} }).filter(Boolean).sort((a,b)=>b.ts-a.ts);
      if(!duels.length){ container.innerHTML = '<div style="text-align:center;padding:32px;font-family:var(--ff-mono);font-size:11px;color:var(--t4)">Aucun duel joué pour l\'instant.</div>'; return; }
      let html = '<div style="display:flex;flex-direction:column;gap:6px">';
      duels.forEach(d => {
        const result = d.result || (d.score > d.opponentScore ? 'win' : d.score < d.opponentScore ? 'loss' : 'draw');
        const icon = result === 'win' ? '🏆' : result === 'loss' ? '💀' : '🤝';
        const color = result === 'win' ? 'var(--green)' : result === 'loss' ? 'var(--red)' : 'var(--gold2)';
        html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border:1px solid var(--bd);border-radius:8px;border-left:3px solid ${color}">
          <span style="font-size:14px">${icon}</span>
          <div style="flex:1">
            <div style="font-size:12px;color:var(--t1)"><strong>${d.player}</strong> <span style="color:var(--t4)">vs</span> <strong>${d.opponent}</strong></div>
            <div style="font-family:var(--ff-mono);font-size:9px;color:var(--t4)">${_timeAgo(d.ts)} · ${d.time || '?'}s</div>
          </div>
          <div style="font-family:var(--ff-mono);font-size:14px;font-weight:700;color:${color}">${d.score}-${d.opponentScore}</div>
        </div>`;
      });
      html += '</div>';
      container.innerHTML = html;
    }catch(e){
      container.innerHTML = '<div style="text-align:center;padding:32px;font-family:var(--ff-mono);font-size:10px;color:var(--t4)">Erreur de chargement</div>';
    }
  }

  window.__duelNext = __duelNext;
  window.__answerDuel = __answerDuel;
  window.sbLogin = sbLogin; window.sbLogout = sbLogout; window.initUser = initUser; window.sbRequestDuel = sbRequestDuel; window._cancelDuelRequest = _cancelDuelRequest; window._acceptDuel = _acceptDuel; window._declineDuel = _declineDuel; window.sbRenderDuelsTab = sbRenderDuelsTab; window._showDuelNotifBanner = _showDuelNotifBanner; window._startDuel = _startDuel; window._onOpponentDuelResult = _onOpponentDuelResult;
  setTimeout(() => {
    _onlineReinitDone = false;
    initUser();
  }, 0);
})();
</script>

</body>
</html>
